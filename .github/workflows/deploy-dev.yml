name: Deploy to dev

# Auto-deploys the compose stack to the tailnet host on every push/merge
# to dev. workflow_dispatch is kept for manual redeploys.
#
# paths-ignore: OpenClaw itself pushes doc + skill changes directly to
# dev (Stream A in the branching model). Those are picked up by the
# git-sync sidecar on the host within ~60s without a rebuild — so we
# skip deploys for changes that don't live in any of the baked images.
on:
  push:
    branches: [dev]
    paths-ignore:
      - '**/*.md'
      - '**/.docs/**'
      - 'ideas/**'
      - '.github/CODEOWNERS'
  workflow_dispatch:
    inputs:
      host:
        description: Tailscale hostname of the target host (defaults to vars.DEPLOY_HOST).
        required: false
      image_tag:
        description: Image tag to push and deploy (default = SHA).
        required: false

# Only one deploy runs at a time. A newer push supersedes an older,
# still-running deploy rather than queueing behind it.
concurrency:
  group: deploy-dev
  cancel-in-progress: true

permissions:
  contents: read
  packages: write

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        service: [backend, frontend, keycloak, openclaw-gateway, openclaw-git-sync]
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Resolve context + dockerfile for ${{ matrix.service }}
        id: paths
        run: |
          case "${{ matrix.service }}" in
            backend)
              echo "context=projects/application/backend" >> "$GITHUB_OUTPUT"
              echo "file=projects/application/backend/dockerfiles/prod.Dockerfile" >> "$GITHUB_OUTPUT"
              ;;
            frontend)
              echo "context=projects/application/frontend" >> "$GITHUB_OUTPUT"
              echo "file=projects/application/frontend/dockerfiles/prod.Dockerfile" >> "$GITHUB_OUTPUT"
              ;;
            keycloak)
              echo "context=projects/application/keycloak" >> "$GITHUB_OUTPUT"
              echo "file=projects/application/keycloak/dockerfiles/Dockerfile" >> "$GITHUB_OUTPUT"
              ;;
            openclaw-gateway)
              echo "context=projects/openclaw" >> "$GITHUB_OUTPUT"
              echo "file=projects/openclaw/dockerfiles/prod.Dockerfile" >> "$GITHUB_OUTPUT"
              ;;
            openclaw-git-sync)
              echo "context=projects/openclaw" >> "$GITHUB_OUTPUT"
              echo "file=projects/openclaw/dockerfiles/git-sync.Dockerfile" >> "$GITHUB_OUTPUT"
              ;;
          esac
      - uses: docker/build-push-action@v6
        with:
          context: ${{ steps.paths.outputs.context }}
          file: ${{ steps.paths.outputs.file }}
          push: true
          platforms: linux/amd64
          tags: |
            ghcr.io/archicain/automated-coding-agent-${{ matrix.service }}:${{ inputs.image_tag || github.sha }}
            ghcr.io/archicain/automated-coding-agent-${{ matrix.service }}:latest

  deploy:
    runs-on: ubuntu-latest
    needs: build-and-push
    steps:
      - uses: actions/checkout@v4

      # Render the compose .env files + the GitHub App PEM from repo
      # secrets/vars into /tmp/config/. deploy.sh ships this to the host.
      # GH Actions automatically masks known secrets in logs, so even a
      # leaky `set -x` won't print them.
      - name: Render host config from secrets + vars
        env:
          POSTGRES_USER: ${{ vars.POSTGRES_USER }}
          POSTGRES_PASSWORD: ${{ secrets.POSTGRES_PASSWORD }}
          POSTGRES_DB: ${{ vars.POSTGRES_DB }}
          KEYCLOAK_CLIENT_SECRET: ${{ secrets.KEYCLOAK_CLIENT_SECRET }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          OPENCLAW_AUTH_TOKEN: ${{ secrets.OPENCLAW_AUTH_TOKEN }}
          GITHUB_APP_ID: ${{ vars.GITHUB_APP_ID }}
          GITHUB_APP_INSTALLATION_ID: ${{ vars.GITHUB_APP_INSTALLATION_ID }}
          GITHUB_APP_PRIVATE_KEY: ${{ secrets.GITHUB_APP_PRIVATE_KEY }}
          DOCKER_SOCKET_GID: ${{ vars.DOCKER_SOCKET_GID }}
        run: |
          mkdir -p /tmp/config

          cat > /tmp/config/dev.env <<EOF
          POSTGRES_USER=${POSTGRES_USER}
          POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
          POSTGRES_DB=${POSTGRES_DB}
          KEYCLOAK_CLIENT_SECRET=${KEYCLOAK_CLIENT_SECRET}
          EOF

          cat > /tmp/config/openclaw.env <<EOF
          ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
          OPENAI_API_KEY=${OPENAI_API_KEY}
          OPENCLAW_AUTH_TOKEN=${OPENCLAW_AUTH_TOKEN}
          GITHUB_APP_ID=${GITHUB_APP_ID}
          GITHUB_APP_INSTALLATION_ID=${GITHUB_APP_INSTALLATION_ID}
          GITHUB_APP_PRIVATE_KEY_HOST_PATH=/srv/aca/secrets/github-app.pem
          GIT_REPO_URL=https://github.com/${{ github.repository }}.git
          OPENCLAW_GIT_BRANCH=dev
          OPENCLAW_GIT_APP_SLUG=scain-openclaw
          DOCKER_SOCKET_GID=${DOCKER_SOCKET_GID}
          EOF

          printf '%s' "$GITHUB_APP_PRIVATE_KEY" > /tmp/config/github-app.pem
          chmod 600 /tmp/config/github-app.pem

      - uses: tailscale/github-action@v2
        with:
          authkey: ${{ secrets.TS_AUTHKEY }}

      - env:
          DEPLOY_USER: ${{ vars.DEPLOY_USER }}
        run: |
          bash scripts/deploy.sh \
            --host "${{ inputs.host || vars.DEPLOY_HOST }}" \
            --image-tag "${{ inputs.image_tag || github.sha }}" \
            --config-dir /tmp/config
