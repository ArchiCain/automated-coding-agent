name: Sync Dev Team History

on:
  schedule:
    - cron: '*/15 * * * *'
  workflow_dispatch:
  repository_dispatch:
    types: [history-sync]

jobs:
  sync:
    runs-on: self-hosted
    steps:
      - uses: actions/checkout@v4
        with:
          ref: the-dev-team/history
          fetch-depth: 0

      - name: Copy history from workspace
        run: |
          HISTORY_SRC="${GITHUB_WORKSPACE}/../.the-dev-team/history"
          if [ -d "$HISTORY_SRC" ]; then
            rsync -av --delete "$HISTORY_SRC/" .the-dev-team/history/ || true
          else
            echo "History source not found — skipping"
          fi

      - name: Commit and push
        run: |
          git config user.name "THE Dev Team History Bot"
          git config user.email "the-dev-team-history@noreply"
          git add .the-dev-team/history/ || true
          git diff --cached --quiet || \
            git commit -m "sync: history update $(date -u +%Y-%m-%dT%H:%M:%SZ)"
          git push origin the-dev-team/history || true
