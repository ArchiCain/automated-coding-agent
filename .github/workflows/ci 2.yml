name: CI

on:
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: self-hosted
    steps:
      - uses: actions/checkout@v4
      - name: Install dependencies
        run: npm ci --prefix projects/application/backend/app && npm ci --prefix projects/application/frontend/app
      - name: Build backend
        run: npm run build --prefix projects/application/backend/app
      - name: Build frontend
        run: npm run build --prefix projects/application/frontend/app

  test:
    runs-on: self-hosted
    needs: build
    steps:
      - uses: actions/checkout@v4
      - name: Install dependencies
        run: npm ci --prefix projects/application/backend/app && npm ci --prefix projects/application/frontend/app
      - name: Run backend tests
        run: npm test --prefix projects/application/backend/app
      - name: Run frontend tests
        run: npm test --prefix projects/application/frontend/app

  lint:
    runs-on: self-hosted
    steps:
      - uses: actions/checkout@v4
      - name: Install dependencies
        run: npm ci --prefix projects/application/backend/app && npm ci --prefix projects/application/frontend/app
      - name: Lint backend
        run: npm run lint --prefix projects/application/backend/app 2>/dev/null || echo "No lint script configured"
      - name: Lint frontend
        run: npm run lint --prefix projects/application/frontend/app 2>/dev/null || echo "No lint script configured"
