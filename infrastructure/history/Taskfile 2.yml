version: '3'

vars:
  HISTORY_DIR: .the-dev-team/history
  STATE_DIR: .the-dev-team/state

tasks:
  search:
    desc: "Search transcripts for a pattern (usage: task history:search -- PATTERN)"
    preconditions:
      - sh: '[ -n "{{.CLI_ARGS}}" ]'
        msg: "Usage: task history:search -- <pattern>"
    cmds:
      - grep -rn "{{.CLI_ARGS}}" {{.HISTORY_DIR}}/sessions/ 2>/dev/null | head -50 || echo "No matches found."

  task:
    desc: "Show task summary (usage: task history:task -- TASK_ID)"
    preconditions:
      - sh: '[ -n "{{.CLI_ARGS}}" ]'
        msg: "Usage: task history:task -- <task-id>"
    cmds:
      - |
        TASK_ID="{{.CLI_ARGS}}"
        FOUND=$(find {{.HISTORY_DIR}}/tasks -name "task-${TASK_ID}-*" 2>/dev/null | head -1)
        if [ -n "$FOUND" ]; then
          cat "$FOUND"
        else
          echo "Task ${TASK_ID} not found in history."
        fi

  sessions:
    desc: "List session transcripts for a task (usage: task history:sessions -- TASK_ID)"
    preconditions:
      - sh: '[ -n "{{.CLI_ARGS}}" ]'
        msg: "Usage: task history:sessions -- <task-id>"
    cmds:
      - find {{.HISTORY_DIR}}/sessions -name "task-{{.CLI_ARGS}}-*" 2>/dev/null || echo "No sessions found."

  tail:
    desc: Follow latest orchestrator events
    cmds:
      - |
        LATEST=$(find {{.HISTORY_DIR}}/orchestrator -name "*.jsonl" 2>/dev/null | sort | tail -1)
        if [ -n "$LATEST" ]; then
          echo "Tailing $LATEST"
          tail -f "$LATEST" | jq . 2>/dev/null || tail -f "$LATEST"
        else
          echo "No orchestrator events found."
        fi

  costs:
    desc: "Show costs for a date (usage: task history:costs -- YYYY-MM-DD, defaults to today)"
    cmds:
      - |
        DATE="{{.CLI_ARGS}}"
        if [ -z "$DATE" ]; then
          DATE=$(date +%Y-%m-%d)
        fi
        echo "=== Costs for ${DATE} ==="
        grep "$DATE" {{.HISTORY_DIR}}/index.jsonl 2>/dev/null | jq -s '{
          tasks: length,
          totalCost: ([.[].cost] | add),
          avgDurationMinutes: (([.[].durationMs // 0] | add) / (length * 60000) | floor),
          completed: ([.[] | select(.status == "completed")] | length),
          failed: ([.[] | select(.status == "failed")] | length)
        }' || echo "No data for ${DATE}."

  failures:
    desc: Show recent failures with reasons
    cmds:
      - |
        echo "=== Recent Failures ==="
        grep '"status":"failed"' {{.HISTORY_DIR}}/index.jsonl 2>/dev/null | tail -10 | jq '{taskId, title, cost}' || echo "No failures recorded."

  sync:
    desc: Trigger immediate history sync via GitHub API dispatch
    cmds:
      - |
        REPO=$(git remote get-url origin 2>/dev/null | sed 's|.*github.com[:/]||;s|\.git$||')
        if [ -z "$REPO" ]; then
          echo "Could not determine GitHub repository."
          exit 1
        fi
        echo "Triggering history sync for ${REPO}..."
        gh api "repos/${REPO}/dispatches" \
          --method POST \
          --field event_type=history-sync \
          --field client_payload='{"trigger":"manual"}'
        echo "Sync dispatch sent."

  cleanup:
    desc: "Remove transcripts older than N days (usage: task history:cleanup -- DAYS)"
    vars:
      MAX_AGE_DAYS: '{{.CLI_ARGS | default "90"}}'
    cmds:
      - |
        echo "Removing transcripts older than {{.MAX_AGE_DAYS}} days..."
        find {{.HISTORY_DIR}}/sessions -name "*.jsonl" -mtime +{{.MAX_AGE_DAYS}} -delete 2>/dev/null || true
        echo "Cleanup complete."
