# DEPRECATED: Being replaced by Minikube (see infrastructure/minikube/)
# Local development environment - hot reload, volume mounts, pgweb
# Usage: docker compose -f infrastructure/docker/compose.yml up -d
#   or:  task infra:docker:start

name: ${COMPOSE_PROJECT_NAME:-projects}

services:
  database:
    build:
      context: ../../projects/application/database
      dockerfile: dockerfiles/postgres.Dockerfile
    ports:
      - "${DATABASE_PORT}:5432"
    environment:
      POSTGRES_DB: ${DATABASE_NAME}
      POSTGRES_USER: ${DATABASE_USERNAME}
      POSTGRES_PASSWORD: ${DATABASE_PASSWORD}
    volumes:
      - database_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DATABASE_USERNAME} -d ${DATABASE_NAME}"]
      interval: 5s
      timeout: 5s
      retries: 5

  pgweb:
    image: sosedoff/pgweb:latest
    ports:
      - "${PGWEB_PORT:-8082}:8081"
    environment:
      PGWEB_DATABASE_URL: postgres://${DATABASE_USERNAME}:${DATABASE_PASSWORD}@database:5432/${DATABASE_NAME}?sslmode=disable
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8081"]
      interval: 10s
      timeout: 5s
      retries: 3
    depends_on:
      database:
        condition: service_healthy

  backend:
    init: true
    platform: linux/amd64
    build:
      context: ../../projects/application/backend
      dockerfile: dockerfiles/local.Dockerfile
    ports:
      - "${BACKEND_PORT}:8080"
    env_file:
      - ../../.env
    environment:
      - NODE_ENV=development
      - PORT=8080
      - SERVICE_NAME=backend
      - DATABASE_PORT=5432
    volumes:
      - ../../projects/application/backend/app:/app
    healthcheck:
      test: ["CMD-SHELL", "node -e \"require('http').get('http://localhost:8080/health', (r) => process.exit(r.statusCode === 200 ? 0 : 1))\""]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    restart: unless-stopped
    depends_on:
      database:
        condition: service_healthy

  keycloak:
    build:
      context: ../../projects/application/keycloak
      dockerfile: dockerfiles/Dockerfile
    ports:
      - "${KEYCLOAK_PORT}:8080"
    env_file:
      - ../../.env
    environment:
      - KC_DB_URL=jdbc:postgresql://database:5432/${DATABASE_NAME}?sslmode=disable
      - KC_DB_SCHEMA=keycloak
      - KC_DB_USERNAME=${DATABASE_USERNAME}
      - KC_DB_PASSWORD=${DATABASE_PASSWORD}
      - DATABASE_SSL=${DATABASE_SSL}
      - KEYCLOAK_ADMIN=admin
      - KEYCLOAK_ADMIN_PASSWORD=${KEYCLOAK_ADMIN_PASSWORD:-admin}
      - KC_REALM=application
      - KC_CLIENT_ID=backend-service
      - FRONTEND_URL=http://${DEV_HOSTNAME:-localhost}:${FRONTEND_PORT}
      - KC_LOG_LEVEL=INFO
      - KC_TRANSACTION_XA_ENABLED=false
      - KC_IMPORT_OVERWRITE=true
    healthcheck:
      test: ["CMD-SHELL", "exec 3<>/dev/tcp/localhost/8080 && echo -e 'GET /health HTTP/1.1\\r\\nHost: localhost\\r\\nConnection: close\\r\\n\\r\\n' >&3 && grep -q '200 OK' <&3"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    restart: unless-stopped
    depends_on:
      database:
        condition: service_healthy

  frontend:
    init: true
    platform: linux/amd64
    build:
      context: ../../projects/application/frontend
      dockerfile: dockerfiles/local.Dockerfile
    ports:
      - "${FRONTEND_PORT}:8080"
    env_file:
      - ../../.env
    environment:
      - NODE_ENV=development
      - PORT=8080
      - SERVICE_NAME=frontend
      - VITE_BACKEND_URL=http://${DEV_HOSTNAME:-localhost}:${BACKEND_PORT}
    volumes:
      - ../../projects/application/frontend/app:/app
      - /app/node_modules
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    restart: unless-stopped
    depends_on:
      backend:
        condition: service_healthy
      keycloak:
        condition: service_healthy

  coding-agent-backend:
    init: true
    build:
      context: ../../projects/coding-agent/backend
      dockerfile: dockerfiles/prod.Dockerfile
    ports:
      - "${CODING_AGENT_BACKEND_PORT}:8080"
    env_file:
      - ../../.env
    environment:
      - NODE_ENV=production
      - PORT=8080
      - SERVICE_NAME=coding-agent-backend
      - CODING_AGENT_CORS_ORIGINS=${CODING_AGENT_CORS_ORIGINS}
      - CODING_AGENT_WORKSPACE_ROOT=${CODING_AGENT_WORKSPACE_ROOT:-/workspace}
      - REPO_ROOT=/workspace
    volumes:
      - ../../:/workspace
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    restart: unless-stopped

  docs:
    build:
      context: ../../projects/docs
      dockerfile: dockerfiles/local.Dockerfile
    ports:
      - "${DOCS_PORT:-8083}:8080"
    volumes:
      - ../../projects/docs/app:/app
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8080/"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    restart: unless-stopped

volumes:
  database_data:
    driver: local
