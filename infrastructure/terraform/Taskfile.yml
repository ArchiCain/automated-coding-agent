version: '3'

tasks:
  init:
    desc: Initialize Terraform for EC2 compose host
    cmds:
      - terraform init

  plan:
    desc: Plan EC2 compose host changes
    cmds:
      - terraform plan

  apply:
    desc: Apply EC2 compose host (creates EC2 with docker + tailscale + caddy)
    cmds:
      - terraform apply

  destroy:
    desc: Destroy the EC2 compose host
    cmds:
      - echo "WARNING - This will destroy the host and all data not on the /mnt/data EBS volume!"
      - terraform destroy

  output:
    desc: Show infrastructure outputs (IP, tailscale hostname, SSH command)
    cmds:
      - terraform output
