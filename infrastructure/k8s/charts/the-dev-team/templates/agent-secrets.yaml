apiVersion: v1
kind: Secret
metadata:
  name: the-dev-team-agent-credentials
  namespace: {{ .Values.serviceAccount.namespace }}
  labels:
    app.kubernetes.io/name: the-dev-team
    app.kubernetes.io/component: agent
type: Opaque
stringData:
  ANTHROPIC_API_KEY: {{ .Values.agentSecrets.anthropicApiKey | default "REPLACE_ME" | quote }}
  GITHUB_TOKEN: {{ .Values.agentSecrets.githubToken | default "REPLACE_ME" | quote }}
