global:
  registry: localhost:30500
  imageTag: latest
  domain: ""
  taskId: ""

backend:
  replicaCount: 1
  image:
    repository: backend
    pullPolicy: IfNotPresent
  port: 8080
  env:
    DATABASE_URL: "postgresql://postgres:postgres@{{ .Release.Name }}-database:5432/app"
    KEYCLOAK_URL: "http://{{ .Release.Name }}-keycloak:8080"
    KEYCLOAK_REALM: app
  resources:
    requests:
      cpu: 100m
      memory: 256Mi
    limits:
      cpu: 500m
      memory: 512Mi

frontend:
  replicaCount: 1
  image:
    repository: frontend
    pullPolicy: IfNotPresent
  port: 8080
  resources:
    requests:
      cpu: 50m
      memory: 128Mi
    limits:
      cpu: 250m
      memory: 256Mi

database:
  image:
    repository: pgvector/pgvector
    tag: "pg16"
    pullPolicy: IfNotPresent
  port: 5432
  auth:
    username: postgres
    password: postgres
    database: app
  storage:
    size: 1Gi
    storageClass: standard
  resources:
    requests:
      cpu: 100m
      memory: 256Mi
    limits:
      cpu: 500m
      memory: 512Mi

keycloak:
  replicaCount: 1
  image:
    repository: quay.io/keycloak/keycloak
    tag: "24.0"
    pullPolicy: IfNotPresent
  port: 8080
  adminUser: admin
  adminPassword: admin
  resources:
    requests:
      cpu: 200m
      memory: 512Mi
    limits:
      cpu: 1000m
      memory: 1Gi

ingress:
  enabled: true
  className: nginx
  annotations: {}
