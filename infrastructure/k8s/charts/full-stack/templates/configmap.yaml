apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ .Release.Name }}-config
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "full-stack.labels" . | nindent 4 }}
data:
  NODE_ENV: "production"
  BACKEND_URL: "http://{{ .Release.Name }}-backend:{{ .Values.backend.port }}"
  FRONTEND_URL: "http://{{ .Release.Name }}-frontend:{{ .Values.frontend.port }}"
  KEYCLOAK_URL: "http://{{ .Release.Name }}-keycloak:{{ .Values.keycloak.port }}"
  KEYCLOAK_REALM: "app"
  DATABASE_HOST: "{{ .Release.Name }}-database"
  DATABASE_PORT: {{ .Values.database.port | quote }}
  DATABASE_NAME: {{ .Values.database.auth.database | quote }}
  DATABASE_USERNAME: {{ .Values.database.auth.username | quote }}
  DATABASE_PASSWORD: {{ .Values.database.auth.password | quote }}
  PORT: {{ .Values.backend.port | quote }}
  {{- if .Values.global.taskId }}
  TASK_ID: {{ .Values.global.taskId | quote }}
  {{- end }}
