{{- if .Values.pgweb.enabled }}
apiVersion: v1
kind: Service
metadata:
  name: {{ .Release.Name }}-database-pgweb
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "full-stack.labels" . | nindent 4 }}
    app.kubernetes.io/component: pgweb
spec:
  type: ClusterIP
  ports:
    - port: 8081
      targetPort: 8081
      protocol: TCP
  selector:
    {{- include "full-stack.selectorLabels" . | nindent 4 }}
    app.kubernetes.io/component: pgweb
{{- end }}
