apiVersion: batch/v1
kind: Job
metadata:
  name: {{ .Release.Name }}-keycloak-realm
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "full-stack.labels" . | nindent 4 }}
    app.kubernetes.io/component: keycloak-setup
  annotations:
    "helm.sh/hook": post-install
    "helm.sh/hook-weight": "5"
    "helm.sh/hook-delete-policy": before-hook-creation,hook-succeeded
spec:
  backoffLimit: 3
  template:
    metadata:
      labels:
        {{- include "full-stack.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: keycloak-setup
    spec:
      restartPolicy: OnFailure
      containers:
        - name: realm-import
          image: "{{ .Values.global.registry }}/{{ .Values.keycloak.image.repository }}:{{ .Values.global.imageTag }}"
          imagePullPolicy: {{ .Values.keycloak.image.pullPolicy }}
          command:
            - /bin/bash
            - -c
            - |
              echo "Waiting for Keycloak to be ready..."
              until curl -sf http://{{ .Release.Name }}-keycloak:{{ .Values.keycloak.port }}/health/ready; do
                sleep 5
              done
              echo "Keycloak is ready. Importing realm..."
              /opt/keycloak/bin/kcadm.sh config credentials \
                --server http://{{ .Release.Name }}-keycloak:{{ .Values.keycloak.port }} \
                --realm master \
                --user {{ .Values.keycloak.adminUser }} \
                --password {{ .Values.keycloak.adminPassword }}
              /opt/keycloak/bin/kcadm.sh create realms \
                -s realm=app \
                -s enabled=true \
                2>/dev/null || echo "Realm already exists."
              echo "Realm import complete."
