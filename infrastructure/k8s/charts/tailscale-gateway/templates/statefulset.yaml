apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: {{ .Release.Name }}
  labels:
    app: {{ .Release.Name }}
spec:
  replicas: 1
  serviceName: {{ .Release.Name }}
  selector:
    matchLabels:
      app: {{ .Release.Name }}
  template:
    metadata:
      labels:
        app: {{ .Release.Name }}
    spec:
      serviceAccountName: {{ .Release.Name }}
      initContainers:
        - name: sysctls
          image: busybox:1.36
          command: ["sh", "-c", "sysctl -w net.ipv4.ip_forward=1 net.ipv6.conf.all.forwarding=1"]
          securityContext:
            privileged: true
      containers:
        - name: tailscale
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: IfNotPresent
          command: ["/bin/sh", "/scripts/start-tailscale.sh"]
          env:
            - name: TS_AUTHKEY
              valueFrom:
                secretKeyRef:
                  name: {{ .Release.Name }}-auth
                  key: TS_AUTHKEY
            - name: TS_HOSTNAME
              value: {{ .Values.hostname | quote }}
            - name: TS_USERSPACE
              value: "false"
            - name: TS_STATE_DIR
              value: /var/lib/tailscale
            - name: TS_KUBE_SECRET
              value: ""
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
          securityContext:
            capabilities:
              add:
                - NET_ADMIN
                - NET_RAW
          volumeMounts:
            - name: state
              mountPath: /var/lib/tailscale
            - name: tun
              mountPath: /dev/net/tun
            - name: scripts
              mountPath: /scripts
              readOnly: true

        - name: coredns
          image: {{ .Values.coredns.image }}
          args: ["-conf", "/etc/coredns/Corefile"]
          ports:
            - containerPort: 53
              protocol: UDP
            - containerPort: 53
              protocol: TCP
          resources:
            {{- toYaml .Values.coredns.resources | nindent 12 }}
          volumeMounts:
            - name: coredns-config
              mountPath: /etc/coredns
              readOnly: true
          livenessProbe:
            tcpSocket:
              port: 53
            initialDelaySeconds: 5
            periodSeconds: 10
          readinessProbe:
            tcpSocket:
              port: 53
            initialDelaySeconds: 2
            periodSeconds: 5

      volumes:
        - name: tun
          hostPath:
            path: /dev/net/tun
        - name: scripts
          configMap:
            name: {{ .Release.Name }}-scripts
            defaultMode: 0755
        - name: coredns-config
          configMap:
            name: {{ .Release.Name }}-corefile
  volumeClaimTemplates:
    - metadata:
        name: state
      spec:
        accessModes: ["ReadWriteOnce"]
        resources:
          requests:
            storage: 64Mi
