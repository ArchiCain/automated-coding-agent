version: '3'

vars:
  CHART_PATH: infrastructure/k8s/charts/full-stack
  VALUES_PATH: infrastructure/k8s/values/sandbox.yaml
  LABEL_SELECTOR: managed-by=the-dev-team

tasks:
  deploy:
    desc: "Build from worktree, push, and deploy a sandbox (usage: task env:deploy NAME=my-feature)"
    vars:
      NAME: '{{.NAME}}'
      WORKTREE: '{{.WORKTREE | default (print "/workspace/.worktrees/" .NAME)}}'
      REGISTRY: '{{.REGISTRY | default "localhost:30500"}}'
      SERVICES: '{{.SERVICES | default "backend frontend"}}'
    preconditions:
      - sh: '[ -n "{{.NAME}}" ]'
        msg: "Usage: task env:deploy NAME=<name> [WORKTREE=<path>] [SERVICES='backend frontend']"
    cmds:
      - |
        NAME="{{.NAME}}"
        WORKTREE="{{.WORKTREE}}"
        REG="{{.REGISTRY}}"
        TAG="${NAME}"
        SERVICES="{{.SERVICES}}"

        echo "=== Building images from worktree ==="
        echo "Worktree: ${WORKTREE}"
        echo "Tag: ${TAG}"
        echo ""

        for svc in ${SERVICES}; do
          case ${svc} in
            backend)
              echo "Building backend..."
              docker build -t ${REG}/backend:${TAG} \
                -f ${WORKTREE}/projects/application/backend/dockerfiles/prod.Dockerfile \
                ${WORKTREE}/projects/application/backend
              docker push ${REG}/backend:${TAG} || true
              ;;
            frontend)
              echo "Building frontend..."
              docker build -t ${REG}/frontend:${TAG} \
                -f ${WORKTREE}/projects/application/frontend/dockerfiles/prod.Dockerfile \
                ${WORKTREE}/projects/application/frontend
              docker push ${REG}/frontend:${TAG} || true
              ;;
            *)
              echo "Unknown service: ${svc}, skipping"
              ;;
          esac
          echo ""
        done

        echo "=== Deploying sandbox env-${NAME} ==="
        kubectl create namespace env-${NAME} --dry-run=client -o yaml | kubectl apply -f -
        kubectl label namespace env-${NAME} managed-by=the-dev-team sandbox-name=${NAME} --overwrite

        helm upgrade --install env-${NAME} \
          {{.CHART_PATH}} \
          --namespace env-${NAME} \
          --values {{.VALUES_PATH}} \
          --set global.imageTag=${TAG} \
          --set global.domain=${DEV_HOSTNAME:?DEV_HOSTNAME is required} \
          --wait --timeout 5m

        echo ""
        echo "=== Waiting for pods ==="
        kubectl wait --for=condition=Ready pods --all -n env-${NAME} --timeout=300s || true

        echo ""
        echo "=== Sandbox deployed ==="
        kubectl get pods -n env-${NAME} --no-headers
        echo ""
        echo "Sandbox env-${NAME} is running."

  create:
    desc: "Create sandbox environment for a task (usage: task env:create -- TASK_ID)"
    vars:
      TASK_ID: '{{.CLI_ARGS}}'
    preconditions:
      - sh: '[ -n "{{.CLI_ARGS}}" ]'
        msg: "Usage: task env:create -- <task-id>"
    cmds:
      - kubectl create namespace env-{{.TASK_ID}} --dry-run=client -o yaml | kubectl apply -f -
      - kubectl label namespace env-{{.TASK_ID}} managed-by=the-dev-team task-id={{.TASK_ID}} --overwrite
      - >-
        helm upgrade --install env-{{.TASK_ID}}
        {{.CHART_PATH}}
        --namespace env-{{.TASK_ID}}
        --values {{.VALUES_PATH}}
        --set global.taskId={{.TASK_ID}}
        --set global.domain=${DEV_HOSTNAME:?DEV_HOSTNAME is required}
        --wait --timeout 5m
      - task: wait-healthy
        vars:
          TASK_ID: '{{.TASK_ID}}'
      - 'echo "Sandbox env-{{.TASK_ID}} is ready."'

  destroy:
    desc: "Destroy sandbox environment (usage: task env:destroy -- TASK_ID)"
    vars:
      TASK_ID: '{{.CLI_ARGS}}'
    preconditions:
      - sh: '[ -n "{{.CLI_ARGS}}" ]'
        msg: "Usage: task env:destroy -- <task-id>"
    cmds:
      - helm uninstall env-{{.TASK_ID}} --namespace env-{{.TASK_ID}} || true
      - kubectl delete namespace env-{{.TASK_ID}} --ignore-not-found
      - 'echo "Sandbox env-{{.TASK_ID}} destroyed."'

  status:
    desc: "Show pod and ingress status for a sandbox (usage: task env:status -- TASK_ID)"
    vars:
      TASK_ID: '{{.CLI_ARGS}}'
    preconditions:
      - sh: '[ -n "{{.CLI_ARGS}}" ]'
        msg: "Usage: task env:status -- <task-id>"
    cmds:
      - |
        echo "=== Pods ==="
        kubectl get pods -n env-{{.TASK_ID}} -o wide
        echo ""
        echo "=== Services ==="
        kubectl get svc -n env-{{.TASK_ID}}
        echo ""
        echo "=== Ingress ==="
        kubectl get ingress -n env-{{.TASK_ID}}

  list:
    desc: List all active sandbox environments
    cmds:
      - kubectl get namespaces -l {{.LABEL_SELECTOR}} -o json | jq -r '.items[] | "\(.metadata.name)\t\(.metadata.labels["task-id"])\t\(.metadata.creationTimestamp)"'

  health:
    desc: "Check health of all services in a sandbox (usage: task env:health -- TASK_ID)"
    vars:
      TASK_ID: '{{.CLI_ARGS}}'
    preconditions:
      - sh: '[ -n "{{.CLI_ARGS}}" ]'
        msg: "Usage: task env:health -- <task-id>"
    cmds:
      - |
        echo "=== Pod Status ==="
        kubectl get pods -n env-{{.TASK_ID}} -o json | jq -r '.items[] | "\(.metadata.name)\t\(.status.phase)\t\(.status.conditions // [] | map(select(.type=="Ready")) | .[0].status // "Unknown")"'
        echo ""
        echo "=== Backend Health ==="
        kubectl exec -n env-{{.TASK_ID}} deploy/env-{{.TASK_ID}}-backend -- curl -sf http://localhost:8000/health 2>/dev/null && echo "OK" || echo "UNHEALTHY"
        echo ""
        echo "=== Frontend Health ==="
        kubectl exec -n env-{{.TASK_ID}} deploy/env-{{.TASK_ID}}-frontend -- curl -sf http://localhost:3000 2>/dev/null && echo "OK" || echo "UNHEALTHY"

  wait-healthy:
    desc: "Wait for all pods to be ready in a sandbox"
    internal: true
    vars:
      TASK_ID: '{{.TASK_ID}}'
    cmds:
      - kubectl wait --for=condition=Ready pods --all -n env-{{.TASK_ID}} --timeout=300s

  logs:
    desc: "Stream logs from a service (vars: TASK_ID, SERVICE)"
    cmds:
      - kubectl logs -n env-{{.TASK_ID}} deploy/env-{{.TASK_ID}}-{{.SERVICE}} -f --tail=100

  logs-all:
    desc: "Stream all logs from a sandbox (usage: task env:logs-all -- TASK_ID)"
    vars:
      TASK_ID: '{{.CLI_ARGS}}'
    preconditions:
      - sh: '[ -n "{{.CLI_ARGS}}" ]'
        msg: "Usage: task env:logs-all -- <task-id>"
    cmds:
      - kubectl logs -n env-{{.TASK_ID}} --all-containers=true -f --tail=50

  logs-errors:
    desc: "Show error-level logs from a sandbox (usage: task env:logs-errors -- TASK_ID)"
    vars:
      TASK_ID: '{{.CLI_ARGS}}'
    preconditions:
      - sh: '[ -n "{{.CLI_ARGS}}" ]'
        msg: "Usage: task env:logs-errors -- <task-id>"
    cmds:
      - kubectl logs -n env-{{.TASK_ID}} --all-containers=true --tail=500 | grep -iE '(error|exception|fatal|panic)' || echo "No errors found."

  build:
    desc: "Build all images from a worktree (vars: WORKTREE_PATH, IMAGE_TAG)"
    vars:
      WORKTREE_PATH: '{{.WORKTREE_PATH | default "."}}'
      IMAGE_TAG: '{{.IMAGE_TAG | default "latest"}}'
    cmds:
      - task: build-backend
        vars:
          WORKTREE_PATH: '{{.WORKTREE_PATH}}'
          IMAGE_TAG: '{{.IMAGE_TAG}}'
      - task: build-frontend
        vars:
          WORKTREE_PATH: '{{.WORKTREE_PATH}}'
          IMAGE_TAG: '{{.IMAGE_TAG}}'
      - task: build-keycloak
        vars:
          WORKTREE_PATH: '{{.WORKTREE_PATH}}'
          IMAGE_TAG: '{{.IMAGE_TAG}}'

  build-backend:
    desc: Build backend image from worktree
    internal: true
    vars:
      WORKTREE_PATH: '{{.WORKTREE_PATH | default "."}}'
      IMAGE_TAG: '{{.IMAGE_TAG | default "latest"}}'
    cmds:
      - 'docker build -t ${REGISTRY:-localhost:30500}/backend:{{.IMAGE_TAG}} -f {{.WORKTREE_PATH}}/projects/application/backend/dockerfiles/prod.Dockerfile {{.WORKTREE_PATH}}/projects/application/backend'
      - 'docker push ${REGISTRY:-localhost:30500}/backend:{{.IMAGE_TAG}}'

  build-frontend:
    desc: Build frontend image from worktree
    internal: true
    vars:
      WORKTREE_PATH: '{{.WORKTREE_PATH | default "."}}'
      IMAGE_TAG: '{{.IMAGE_TAG | default "latest"}}'
    cmds:
      - 'docker build -t ${REGISTRY:-localhost:30500}/frontend:{{.IMAGE_TAG}} -f {{.WORKTREE_PATH}}/projects/application/frontend/dockerfiles/prod.Dockerfile {{.WORKTREE_PATH}}/projects/application/frontend'
      - 'docker push ${REGISTRY:-localhost:30500}/frontend:{{.IMAGE_TAG}}'

  build-keycloak:
    desc: Build keycloak image from worktree
    internal: true
    vars:
      WORKTREE_PATH: '{{.WORKTREE_PATH | default "."}}'
      IMAGE_TAG: '{{.IMAGE_TAG | default "latest"}}'
    cmds:
      - 'docker build -t ${REGISTRY:-localhost:30500}/keycloak:{{.IMAGE_TAG}} -f {{.WORKTREE_PATH}}/projects/application/keycloak/dockerfiles/Dockerfile {{.WORKTREE_PATH}}/projects/application/keycloak'
      - 'docker push ${REGISTRY:-localhost:30500}/keycloak:{{.IMAGE_TAG}}'

  db-shell:
    desc: "Open psql shell in sandbox database (usage: task env:db-shell -- TASK_ID)"
    vars:
      TASK_ID: '{{.CLI_ARGS}}'
    preconditions:
      - sh: '[ -n "{{.CLI_ARGS}}" ]'
        msg: "Usage: task env:db-shell -- <task-id>"
    cmds:
      - kubectl exec -it -n env-{{.TASK_ID}} statefulset/env-{{.TASK_ID}}-database -- psql -U postgres

  db-query:
    desc: "Run a query against sandbox database (vars: TASK_ID, QUERY)"
    cmds:
      - 'kubectl exec -n env-{{.TASK_ID}} statefulset/env-{{.TASK_ID}}-database -- psql -U postgres -c "{{.QUERY}}"'

  exec:
    desc: "Exec into a pod (vars: TASK_ID, SERVICE)"
    cmds:
      - kubectl exec -it -n env-{{.TASK_ID}} deploy/env-{{.TASK_ID}}-{{.SERVICE}} -- /bin/sh

  port-forward:
    desc: "Port-forward a service (vars: TASK_ID, SERVICE, PORT)"
    cmds:
      - kubectl port-forward -n env-{{.TASK_ID}} svc/env-{{.TASK_ID}}-{{.SERVICE}} {{.PORT}}

  restart:
    desc: "Restart a service in a sandbox (vars: TASK_ID, SERVICE)"
    cmds:
      - kubectl rollout restart -n env-{{.TASK_ID}} deploy/env-{{.TASK_ID}}-{{.SERVICE}}
      - kubectl rollout status -n env-{{.TASK_ID}} deploy/env-{{.TASK_ID}}-{{.SERVICE}} --timeout=120s

  cleanup-stale:
    desc: "Tear down sandboxes older than N hours (usage: task env:cleanup-stale -- HOURS)"
    vars:
      MAX_AGE_HOURS: '{{.CLI_ARGS | default "24"}}'
    cmds:
      - |
        CUTOFF=$(date -u -v-{{.MAX_AGE_HOURS}}H +%Y-%m-%dT%H:%M:%SZ 2>/dev/null || date -u -d "{{.MAX_AGE_HOURS}} hours ago" +%Y-%m-%dT%H:%M:%SZ)
        kubectl get namespaces -l {{.LABEL_SELECTOR}} -o json | \
          jq -r --arg cutoff "$CUTOFF" '.items[] | select(.metadata.creationTimestamp < $cutoff) | .metadata.labels["task-id"]' | \
          while read -r tid; do
            echo "Destroying stale sandbox: env-${tid}"
            helm uninstall "env-${tid}" --namespace "env-${tid}" 2>/dev/null || true
            kubectl delete namespace "env-${tid}" --ignore-not-found
          done
        echo "Stale sandbox cleanup complete."
