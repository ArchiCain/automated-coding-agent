# OpenClaw stack for Docker Compose.
#
# Two surface services (gateway, git-sync) and a five-service Honcho memory
# substack (honcho-{db,redis,migrate,api,deriver}). One named volume,
# `workspace`, is shared between gateway + git-sync so the sidecar's clone
# and the rolling installation token are visible to the gateway. Another
# named volume, `honcho-db-data`, persists Honcho's pgvector store.
#
# Network model:
#   The gateway uses `network_mode: host` so it inherits host-machine's
#   tailnet routes. Without this, the container can't resolve or reach
#   `graphics-machine` (the brain LLM box) over the tailnet. The gateway
#   listens on host:3001 directly (per gateway.port in openclaw.json).
#
#   The Honcho services run on the project's default bridge network and
#   talk to each other via service names. honcho-api is published on
#   127.0.0.1:8000 so the host-networked gateway can reach it via
#   `http://localhost:8000` (see plugins.openclaw-honcho.config.baseUrl in
#   openclaw.json). honcho-{api,migrate,deriver} reach host-machine's
#   Ollama (where qwen-coder-32k + the bge-m3-8k alias live) via
#   `host.docker.internal` — wired through `extra_hosts: host-gateway`
#   on each service.
#
# The gateway bind-mounts the host docker socket so the devops agent can
# run `docker compose` + `task` directly for sandbox provisioning.

services:
  gateway:
    build:
      context: ../../../projects/openclaw
      dockerfile: dockerfiles/prod.Dockerfile
    network_mode: host
    # Restart on crash so transient OpenClaw plugin issues don't leave the
    # gateway down indefinitely. `unless-stopped` won't fight an explicit
    # `compose down`.
    restart: unless-stopped
    # Wait for Honcho's API to pass its healthcheck before starting. The
    # openclaw-honcho plugin's SDK memoizes _ensureWorkspace() on first call;
    # if Honcho is down at gateway start, the rejected promise is cached and
    # every subsequent honcho_* call returns the cached failure WITHOUT making
    # an HTTP request — only a gateway restart clears it. Strict ordering
    # avoids ever hitting that trap.
    depends_on:
      git-sync:
        condition: service_started
      honcho-api:
        condition: service_healthy
    environment:
      OLLAMA_API_KEY: ${OLLAMA_API_KEY:-ollama-local}
      OPENCLAW_AUTH_TOKEN: ${OPENCLAW_AUTH_TOKEN}
      OPENCLAW_ALLOWED_ORIGINS: ${OPENCLAW_ALLOWED_ORIGINS:-http://localhost:3001}
      # Bonjour/mDNS LAN discovery has no path through the docker bridge and
      # crashes the gateway with CIAO ANNOUNCEMENT CANCELLED unhandled
      # rejections. Container access is via tailnet hostname, not LAN mDNS.
      OPENCLAW_DISABLE_BONJOUR: "1"
      OPENCLAW_WAIT_FOR_REPO: "1"
      OPENCLAW_GIT_BRANCH: ${OPENCLAW_GIT_BRANCH:-dev}
      OPENCLAW_GIT_APP_SLUG: ${OPENCLAW_GIT_APP_SLUG:-scain-openclaw}
      GITHUB_APP_ID: ${GITHUB_APP_ID}
      # Tier-2 fast model on host-machine (Gemma 4 E4B). Not referenced by
      # the current openclaw.json (which hardcodes the host-machine ollama
      # endpoint under models.providers.ollama-host) — kept here as the
      # canonical pointer if/when openclaw.json switches to env-templated
      # provider config or a skill needs the values at runtime.
      OLLAMA_TIER2_BASE_URL: ${OLLAMA_TIER2_BASE_URL:-http://host-machine:11434}
      OLLAMA_TIER2_MODEL: ${OLLAMA_TIER2_MODEL:-gemma4-e4b-128k}
      # Telegram bot tokens — one per main agent. Resolved by the gateway
      # via SecretRef pointing at these env var names (see channels.telegram
      # .accounts.<id>.botToken in openclaw.json). Empty values disable that
      # bot at boot — schema validation surfaces empty refs as a clear error.
      TELEGRAM_BOT_TOKEN_DEV_MAIN: ${TELEGRAM_BOT_TOKEN_DEV_MAIN}
      TELEGRAM_BOT_TOKEN_DND_MAIN: ${TELEGRAM_BOT_TOKEN_DND_MAIN}
      TELEGRAM_BOT_TOKEN_EMAIL_MAIN: ${TELEGRAM_BOT_TOKEN_EMAIL_MAIN}
      TELEGRAM_BOT_TOKEN_BACKPACKING_MAIN: ${TELEGRAM_BOT_TOKEN_BACKPACKING_MAIN}
    # The gateway runs as `node` (uid 1000); it needs to open the host's
    # docker socket. On host-machine (Ubuntu) the socket is root:docker 660,
    # so DOCKER_SOCKET_GID should be the docker group gid:
    #   DOCKER_SOCKET_GID=$(getent group docker | cut -d: -f3)
    # Set it in /srv/aca/infrastructure/compose/openclaw/.env.
    group_add:
      - "${DOCKER_SOCKET_GID:-999}"
    volumes:
      - workspace:/workspace
      - /var/run/docker.sock:/var/run/docker.sock
      # Mount the host deploy directory at the SAME path as on the host so
      # `docker compose -f /srv/aca/.../compose.yml ...` resolves `./relative`
      # bind-mounts (like the dev frontend's `./nginx.conf`) to a path the
      # host's docker daemon can actually find. Without this, devops invoking
      # compose from inside the gateway breaks every sandbox/dev container
      # that uses a relative bind-mount: compose evaluates `./nginx.conf`
      # against the gateway's view (e.g. `/workspace/repo/...`), passes that
      # path to the daemon, and the daemon fails with "not a directory".
      # Read-only because devops is meant to RUN compose against these files,
      # not edit them — edits flow through git.
      - /srv/aca:/srv/aca:ro

  git-sync:
    build:
      context: ../../../projects/openclaw
      dockerfile: dockerfiles/git-sync.Dockerfile
    restart: unless-stopped
    user: "1000:1000"
    # Override alpine/git's ENTRYPOINT (which is `git`). Without this reset,
    # our `command:` below would be appended as `git sh /usr/local/bin/...`.
    entrypoint: ["sh"]
    command: ["/usr/local/bin/git-sync.sh"]
    environment:
      HOME: /workspace/.openclaw/git-sync-home
      GIT_REPO_URL: ${GIT_REPO_URL}
      GIT_BRANCH: ${OPENCLAW_GIT_BRANCH:-dev}
      GIT_CLONE_DIR: /workspace/repo
      GIT_INTERVAL: "60"
      GITHUB_APP_ID: ${GITHUB_APP_ID}
      GITHUB_APP_INSTALLATION_ID: ${GITHUB_APP_INSTALLATION_ID}
      GITHUB_APP_PRIVATE_KEY_PATH: /etc/github-app/private-key.pem
    volumes:
      - workspace:/workspace
      # Fallback default lets `docker compose config` validate the file even on
      # dev hosts where this env var isn't set (e.g. when bringing up the dev
      # overlay via compose.dev.yml, where git-sync is profile-excluded anyway).
      # In prod the env var is always set, so the fallback never engages.
      - ${GITHUB_APP_PRIVATE_KEY_HOST_PATH:-./git-sync.sh}:/etc/github-app/private-key.pem:ro
      - ./git-sync.sh:/usr/local/bin/git-sync.sh:ro

  # ---------------------------------------------------------------------------
  # Honcho — AI-native cross-session memory for OpenClaw agents.
  # Self-hosted: pgvector + Redis + one-shot Alembic migrate + API + deriver.
  # Pinned to v3.0.6 for reproducibility.
  #
  # Startup ordering:
  #   honcho-db (healthy)
  #     → honcho-migrate (alembic upgrade head, then exits)
  #       → honcho-api (waits for migrate completion + db; healthcheck on /health)
  #         → honcho-deriver (waits for api healthy)
  #         → gateway (waits for api healthy — see gateway.depends_on above)
  #
  # All three Honcho services that call LLMs (migrate is config-only, no calls)
  # route through OPENAI_COMPATIBLE_BASE_URL → host-machine's Ollama on the
  # tailnet host. Embedding and chat completions go to the same endpoint
  # because Ollama's /v1 shim handles both. Provider/model selection is in
  # honcho-config.toml.
  # ---------------------------------------------------------------------------
  honcho-db:
    image: pgvector/pgvector:pg15
    restart: unless-stopped
    environment:
      POSTGRES_USER: honcho
      POSTGRES_PASSWORD: ${HONCHO_DB_PASSWORD:-honcho}
      POSTGRES_DB: honcho
    volumes:
      - honcho-db-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "honcho", "-d", "honcho"]
      interval: 5s
      timeout: 5s
      retries: 10

  honcho-redis:
    image: redis:7-alpine
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  # One-shot Alembic migration + pgvector dimension fix. Honcho's
  # docker-compose example does NOT auto-migrate; their self-hosting README
  # expects the operator to run `alembic upgrade head` manually. We bake it
  # into the compose graph so a clean deploy works hands-off.
  #
  # Post-migration step: Honcho v3.0.6's alembic migrations hardcode the
  # pgvector embedding column at vector(1536) — the OpenAI default. Our
  # `[vector_store].DIMENSIONS = 1024` config setting in honcho-config.toml
  # is honored by Honcho's runtime checks but NOT by the migration. Without
  # this fix, every Honcho save fails with
  #   ValueError: expected 1536 dimensions, not 1024
  # because bge-m3 emits 1024-dim. We re-ALTER the columns + rebuild HNSW
  # indexes after alembic. Idempotent: skips if already 1024.
  honcho-migrate:
    image: ghcr.io/plastic-labs/honcho:v3.0.6
    restart: "no"
    depends_on:
      honcho-db:
        condition: service_healthy
    working_dir: /app
    entrypoint: ["python"]
    command:
      - -c
      - |
        import os, subprocess, sys, psycopg
        rc = subprocess.call(["alembic", "upgrade", "head"])
        if rc != 0:
            sys.exit(rc)
        url = os.environ["DB_CONNECTION_URI"].replace("+psycopg", "")
        target = 1024
        with psycopg.connect(url, autocommit=True) as conn, conn.cursor() as cur:
            for tbl, idx in (("documents", "ix_documents_embedding_hnsw"),
                             ("message_embeddings", "ix_message_embeddings_embedding_hnsw")):
                cur.execute(
                    "SELECT format_type(atttypid, atttypmod) FROM pg_attribute "
                    "WHERE attrelid = %s::regclass AND attname = 'embedding'", (tbl,))
                cur_type = (cur.fetchone() or [""])[0]
                if cur_type == f"vector({target})":
                    print(f"{tbl}.embedding already vector({target}); skipping")
                    continue
                print(f"{tbl}.embedding is {cur_type!r}; migrating to vector({target})")
                cur.execute(f"DROP INDEX IF EXISTS {idx}")
                cur.execute(f"ALTER TABLE {tbl} ALTER COLUMN embedding TYPE vector({target})")
                cur.execute(
                    f"CREATE INDEX {idx} ON {tbl} USING hnsw (embedding vector_cosine_ops) "
                    "WITH (m=16, ef_construction=64)")
                print(f"  done.")
    volumes:
      - ./honcho-config.toml:/app/config.toml:ro
    environment:
      DB_CONNECTION_URI: postgresql+psycopg://honcho:${HONCHO_DB_PASSWORD:-honcho}@honcho-db:5432/honcho

  honcho-api:
    image: ghcr.io/plastic-labs/honcho:v3.0.6
    restart: unless-stopped
    depends_on:
      honcho-db:
        condition: service_healthy
      honcho-migrate:
        condition: service_completed_successfully
      honcho-redis:
        condition: service_started
    # Loopback-only: the host-networked gateway reaches this via
    # http://localhost:8000. Nothing outside the host should hit it.
    ports:
      - "127.0.0.1:8000:8000"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    healthcheck:
      # GET /health returns {"status":"ok"} when the FastAPI app is up. Image
      # has no curl/wget — use stdlib urllib.
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request,sys; urllib.request.urlopen('http://localhost:8000/health', timeout=2); sys.exit(0)",
        ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    volumes:
      - ./honcho-config.toml:/app/config.toml:ro
    environment:
      DB_CONNECTION_URI: postgresql+psycopg://honcho:${HONCHO_DB_PASSWORD:-honcho}@honcho-db:5432/honcho
      REDIS_URL: redis://honcho-redis:6379
      LLM_OPENAI_COMPATIBLE_API_KEY: ${OLLAMA_API_KEY:-ollama-local}
      LLM_OPENAI_COMPATIBLE_BASE_URL: http://host.docker.internal:11434/v1
      AUTH_USE_AUTH: "false"
      SENTRY_ENABLED: "false"

  honcho-deriver:
    image: ghcr.io/plastic-labs/honcho:v3.0.6
    restart: unless-stopped
    depends_on:
      honcho-api:
        condition: service_healthy
    command: ["python", "-m", "src.deriver"]
    extra_hosts:
      - "host.docker.internal:host-gateway"
    # The image's default healthcheck probes localhost:8000/health, but the
    # deriver doesn't run an HTTP server — only the api does. Disable to stop
    # docker from marking this container unhealthy.
    healthcheck:
      disable: true
    volumes:
      - ./honcho-config.toml:/app/config.toml:ro
    environment:
      DB_CONNECTION_URI: postgresql+psycopg://honcho:${HONCHO_DB_PASSWORD:-honcho}@honcho-db:5432/honcho
      REDIS_URL: redis://honcho-redis:6379
      LLM_OPENAI_COMPATIBLE_API_KEY: ${OLLAMA_API_KEY:-ollama-local}
      LLM_OPENAI_COMPATIBLE_BASE_URL: http://host.docker.internal:11434/v1
      AUTH_USE_AUTH: "false"
      SENTRY_ENABLED: "false"

volumes:
  workspace:
  honcho-db-data:
