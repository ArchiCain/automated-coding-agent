# Production override for the dev stack on EC2.
#
# Layer on top of compose.yml:
#   docker compose \
#     -f infrastructure/compose/dev/compose.yml \
#     -f infrastructure/compose/dev/compose.prod.yml \
#     up -d
#
# Each application service switches to a GHCR image and drops the local
# `build:` block (the EC2 host doesn't have the build context). Ports,
# environment, depends_on, and volumes come from compose.yml unchanged.
#
# IMAGE_TAG is injected by scripts/deploy.sh / the deploy workflow.

services:
  backend:
    image: ghcr.io/archicain/automated-coding-agent-backend:${IMAGE_TAG:-latest}
    build: !reset null

  frontend:
    image: ghcr.io/archicain/automated-coding-agent-frontend:${IMAGE_TAG:-latest}
    build: !reset null

  keycloak:
    image: ghcr.io/archicain/automated-coding-agent-keycloak:${IMAGE_TAG:-latest}
    build: !reset null
