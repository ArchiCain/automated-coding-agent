# Dev application stack for Docker Compose.
#
# Four services: postgres, backend, frontend, keycloak. Uses compose's
# default bridge network for the project — service-to-service DNS is
# provided automatically by compose (e.g. backend -> postgres:5432).
#
# Host port mapping (phase 1 port-based URL model):
#   frontend -> http://localhost:3000
#   backend  -> http://localhost:8080
#   keycloak -> http://localhost:8081
#   postgres -> internal only (not published)

services:
  postgres:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: app
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s

  backend:
    build:
      context: ../../../projects/application/backend
      dockerfile: dockerfiles/prod.Dockerfile
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      NODE_ENV: production
      PORT: "8080"
      DATABASE_HOST: postgres
      DATABASE_PORT: "5432"
      DATABASE_USERNAME: postgres
      DATABASE_PASSWORD: postgres
      DATABASE_NAME: app
      DATABASE_SSL: "false"
      DATABASE_LOGGING: "false"
      KEYCLOAK_BASE_URL: http://keycloak:8080
      KEYCLOAK_REALM: application
      KEYCLOAK_CLIENT_ID: backend-service
      KEYCLOAK_CLIENT_SECRET: backend-service-secret
      CORS_ORIGINS: http://localhost:3000

  frontend:
    build:
      context: ../../../projects/application/frontend
      dockerfile: dockerfiles/prod.Dockerfile
    ports:
      - "3000:8080"
    depends_on:
      - backend
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro

  keycloak:
    build:
      context: ../../../projects/application/keycloak
      dockerfile: dockerfiles/Dockerfile
    ports:
      - "8081:8080"
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      KEYCLOAK_ADMIN: admin
      KEYCLOAK_ADMIN_PASSWORD: admin
      KC_DB: postgres
      KC_DB_URL_HOST: postgres
      KC_DB_URL_PORT: "5432"
      KC_DB_URL_DATABASE: app
      KC_DB_USERNAME: postgres
      KC_DB_PASSWORD: postgres
      KC_DB_SCHEMA: keycloak
      KC_REALM: application
      KC_CLIENT_ID: backend-service
      KEYCLOAK_CLIENT_SECRET: backend-service-secret
      KC_LOG_LEVEL: INFO
      KC_TRANSACTION_XA_ENABLED: "false"
      KC_IMPORT_OVERWRITE: "true"
      KC_HOSTNAME_STRICT: "false"
      KC_PROXY: edge
      DATABASE_SSL: "false"
      FRONTEND_URL: http://localhost:3000

volumes:
  postgres-data:
