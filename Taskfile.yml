version: '3'

dotenv: ['.env']

includes:
  backend: ./projects/application/backend/Taskfile.yml
  frontend: ./projects/application/frontend/Taskfile.yml
  database: ./projects/application/database/Taskfile.yml
  keycloak: ./projects/application/keycloak/Taskfile.yml
  e2e: ./projects/application/e2e/Taskfile.yml
  devteam-backend: ./projects/the-dev-team/backend/Taskfile.yml
  devteam-frontend: ./projects/the-dev-team/frontend/Taskfile.yml
  docs: ./projects/docs/Taskfile.yml
  infra:
    taskfile: ./infrastructure/Taskfile.yml
    dir: ./infrastructure
  env:
    taskfile: infrastructure/agent-envs/Taskfile.yml
    dir: .
  history:
    taskfile: infrastructure/history/Taskfile.yml
    dir: .
  minikube:
    taskfile: infrastructure/minikube/Taskfile.yml
    dir: .

tasks:
  default:
    desc: Show available tasks
    cmds:
      - task --list

  # ===================================================================
  # Local Development (Docker Compose) — delegates to infra:docker:*
  # ===================================================================

  start-local:
    desc: Start all local services (database, backend, keycloak, frontend, pgweb)
    cmds:
      - task: infra:docker:start

  start-local:build:
    desc: Start all local services with rebuild
    cmds:
      - task: infra:docker:start:build

  stop-local:
    desc: Stop all local services gracefully
    cmds:
      - task: infra:docker:stop

  purge-local:
    desc: Complete teardown of all local services (removes volumes)
    cmds:
      - task: infra:docker:purge

  purge-and-restart-local:
    desc: Complete teardown and fresh restart of all services
    cmds:
      - task: infra:docker:purge-and-restart

  logs-local:
    desc: Show logs from all services
    cmds:
      - task: infra:docker:logs

  status:
    desc: "Show cluster and service status"
    cmds:
      - |
        echo "=== Minikube ==="
        minikube status 2>/dev/null || echo "Not running"
        echo ""
        echo "=== Pods (all namespaces) ==="
        kubectl get pods -A --no-headers 2>/dev/null | grep -v kube-system || echo "No application pods"
        echo ""
        echo "=== Services ==="
        kubectl get svc -A --no-headers 2>/dev/null | grep -v kube-system || echo "No services"

  logs:
    desc: "Show logs for a service (usage: task logs -- the-dev-team-backend)"
    cmds:
      - kubectl logs -f deployment/{{.CLI_ARGS}} -n the-dev-team --tail=100

  open:
    desc: "Port-forward frontend and backend for local access"
    cmds:
      - |
        pkill -f "port-forward.*the-dev-team" 2>/dev/null || true
        sleep 1
        kubectl port-forward -n the-dev-team svc/the-dev-team-frontend 3002:8080 &
        kubectl port-forward -n the-dev-team svc/the-dev-team-backend 8086:8080 &
        sleep 2
        echo "============================================"
        echo "  Chat UI:  http://localhost:3002"
        echo "  API:      http://localhost:8086"
        echo "============================================"
        echo "Port-forwards running. Run 'task close' to stop."

  close:
    desc: "Stop port-forwards"
    cmds:
      - pkill -f "port-forward.*the-dev-team" 2>/dev/null || true
      - echo "Port-forwards stopped."

  # ===================================================================
  # THE Dev Team — Minikube-based full stack
  # ===================================================================

  up:
    desc: "Start THE Dev Team (Minikube + build + deploy)"
    cmds:
      - task: minikube:start
      - task: setup-secrets
      - task: up:build-and-deploy
      - task: open

  up:build-and-deploy:
    desc: "Build images into Minikube and deploy (internal)"
    internal: true
    cmds:
      - |
        echo "=== Configuring Docker for Minikube ==="
        eval $(minikube docker-env)
        REG="${REGISTRY:-localhost:30500}"
        TAG="${IMAGE_TAG:-latest}"
        echo "Registry: $REG"
        echo ""

        echo "=== Building and pushing images ==="
        for img in backend frontend keycloak the-dev-team-backend the-dev-team-frontend docs; do
          case $img in
            backend)
              docker build -t $REG/$img:$TAG -f projects/application/backend/dockerfiles/prod.Dockerfile projects/application/backend ;;
            frontend)
              docker build -t $REG/$img:$TAG --build-arg VITE_BACKEND_URL=http://api.${DEV_HOSTNAME:-localhost} -f projects/application/frontend/dockerfiles/prod.Dockerfile projects/application/frontend ;;
            keycloak)
              docker build -t $REG/$img:$TAG -f projects/application/keycloak/dockerfiles/Dockerfile projects/application/keycloak ;;
            the-dev-team-backend)
              docker build --build-arg CACHEBUST=$(date +%s) -t $REG/$img:$TAG -f projects/the-dev-team/backend/dockerfiles/prod.Dockerfile projects/the-dev-team/backend ;;
            the-dev-team-frontend)
              docker build -t $REG/$img:$TAG -f projects/the-dev-team/frontend/dockerfiles/prod.Dockerfile projects/the-dev-team/frontend ;;
            docs)
              docker build -t $REG/$img:$TAG -f projects/docs/dockerfiles/prod.Dockerfile projects/docs ;;
          esac
          docker push $REG/$img:$TAG || echo "Push failed for $img — images are still in Minikube Docker"
        done
        echo ""
        echo "=== All images built and pushed ==="
      - task: deploy:apply

  reset:
    desc: "Wipe all K8s state and redeploy from scratch (keeps Minikube VM)"
    cmds:
      - |
        echo "=== Stopping port-forwards ==="
        pkill -f "port-forward" 2>/dev/null || true

        echo ""
        echo "=== Uninstalling all Helm releases ==="
        for ns in $(kubectl get namespaces -o jsonpath='{.items[*].metadata.name}'); do
          for release in $(helm list -n "$ns" -q 2>/dev/null); do
            echo "  Uninstalling $release from $ns"
            helm uninstall "$release" -n "$ns" 2>/dev/null || true
          done
        done

        echo ""
        echo "=== Deleting application namespaces ==="
        SYSTEM_NS="default kube-system kube-public kube-node-lease"
        for ns in $(kubectl get namespaces -o jsonpath='{.items[*].metadata.name}'); do
          if echo "$SYSTEM_NS" | grep -qw "$ns"; then
            continue
          fi
          echo "  Deleting namespace $ns"
          kubectl delete namespace "$ns" --ignore-not-found --timeout=60s 2>/dev/null || true
        done

        echo ""
        echo "=== Pruning Docker images ==="
        eval $(minikube docker-env)
        docker system prune -a -f --volumes 2>/dev/null || true

        echo ""
        echo "=== Cleaning up Minikube PVs ==="
        kubectl delete pv --all --ignore-not-found 2>/dev/null || true

        echo ""
        echo "=== Reset complete ==="
        echo "Run 'task up' to rebuild and deploy everything."

  reset:up:
    desc: "Full reset and redeploy from scratch"
    cmds:
      - task: reset
      - task: up

  down:
    desc: "Stop Minikube cluster (preserves state)"
    cmds:
      - minikube stop
      - |
        echo "Minikube stopped. State preserved."
        echo "  task up        — resume"
        echo "  task destroy   — delete cluster entirely"

  destroy:
    desc: "Delete Minikube cluster and all data"
    cmds:
      - minikube delete
      - echo "Minikube cluster deleted."

  setup-secrets:
    desc: "Create K8s secrets from .env (run before first deploy)"
    cmds:
      - scripts/setup-k8s-secrets.sh

  tailscale:hostname:
    desc: "Print your Tailscale hostname (paste into .env as DEV_HOSTNAME)"
    cmds:
      - |
        HOSTNAME=$(./scripts/detect-tailscale-hostname.sh)
        if [ -z "$HOSTNAME" ]; then
          echo "Tailscale not installed or not running."
          echo "Install: https://tailscale.com/download"
          exit 1
        fi
        echo ""
        echo "Your Tailscale hostname: $HOSTNAME"
        echo ""
        echo "To use it, set in .env:"
        echo "  DEV_HOSTNAME=$HOSTNAME"
        echo ""
        echo "Then restart your dev environment:"
        echo "  task stop-local && task start-local"

  # ===================================================================
  # Testing
  # ===================================================================

  run-all-tests:
    desc: Run complete test suite (unit + integration + e2e)
    cmds:
      - echo "Running complete test suite..."
      - echo ""
      - echo "Running backend unit tests..."
      - task: backend:local:test
      - echo ""
      - echo "Running frontend unit tests..."
      - task: frontend:local:test
      - echo ""
      - echo "Running backend integration tests..."
      - task: backend:local:test:integration
      - echo ""
      - echo "Running frontend integration tests..."
      - task: frontend:local:test:integration
      - echo ""
      - echo "Running e2e tests..."
      - task: e2e:test
      - echo ""
      - echo "All tests passed!"

  # ===================================================================
  # Infrastructure — delegates to infra:terraform:*
  # ===================================================================

  infra:init:
    desc: Initialize Terraform for K3s infrastructure
    cmds:
      - task: infra:terraform:init

  infra:plan:
    desc: Plan K3s infrastructure changes
    cmds:
      - task: infra:terraform:plan

  infra:apply:
    desc: Apply K3s infrastructure (creates EC2 + K3s)
    cmds:
      - task: infra:terraform:apply

  infra:destroy:
    desc: Destroy K3s infrastructure
    cmds:
      - task: infra:terraform:destroy

  infra:output:
    desc: Show K3s infrastructure outputs (IP, URLs)
    cmds:
      - task: infra:terraform:output

  # ===================================================================
  # Build & Push (Container Images)
  # ===================================================================
  # Images are pushed to an in-cluster registry running on the K3s node.
  # This is used instead of ECR/GHCR because for a single-node K3s setup
  # there is no practical benefit to a managed registry — the only image
  # consumer is on the same node. To switch to ECR/GHCR later, just
  # change the REGISTRY env var.

  build:all:
    desc: Build and push all service images
    vars:
      WORKTREE_PATH: '{{.WORKTREE_PATH | default "."}}'
      IMAGE_TAG: '{{.IMAGE_TAG | default "latest"}}'
    cmds:
      - task: build:backend
        vars:
          WORKTREE_PATH: '{{.WORKTREE_PATH}}'
          IMAGE_TAG: '{{.IMAGE_TAG}}'
      - task: build:frontend
        vars:
          WORKTREE_PATH: '{{.WORKTREE_PATH}}'
          IMAGE_TAG: '{{.IMAGE_TAG}}'
      - task: build:keycloak
        vars:
          WORKTREE_PATH: '{{.WORKTREE_PATH}}'
          IMAGE_TAG: '{{.IMAGE_TAG}}'
      - task: build:the-dev-team-backend
        vars:
          WORKTREE_PATH: '{{.WORKTREE_PATH}}'
          IMAGE_TAG: '{{.IMAGE_TAG}}'
      - task: build:the-dev-team-frontend
        vars:
          WORKTREE_PATH: '{{.WORKTREE_PATH}}'
          IMAGE_TAG: '{{.IMAGE_TAG}}'
      - task: build:docs
        vars:
          WORKTREE_PATH: '{{.WORKTREE_PATH}}'
          IMAGE_TAG: '{{.IMAGE_TAG}}'

  build:backend:
    desc: Build and push backend image
    vars:
      WORKTREE_PATH: '{{.WORKTREE_PATH | default "."}}'
      IMAGE_TAG: '{{.IMAGE_TAG | default "latest"}}'
    cmds:
      - docker build -t ${REGISTRY:-localhost:30500}/backend:{{.IMAGE_TAG}} -f {{.WORKTREE_PATH}}/projects/application/backend/dockerfiles/prod.Dockerfile {{.WORKTREE_PATH}}/projects/application/backend
      - docker push ${REGISTRY:-localhost:30500}/backend:{{.IMAGE_TAG}}

  build:frontend:
    desc: Build and push frontend image
    vars:
      WORKTREE_PATH: '{{.WORKTREE_PATH | default "."}}'
      IMAGE_TAG: '{{.IMAGE_TAG | default "latest"}}'
    cmds:
      - docker build -t ${REGISTRY:-localhost:30500}/frontend:{{.IMAGE_TAG}} --build-arg VITE_BACKEND_URL=${VITE_BACKEND_URL:-http://api.localhost} -f {{.WORKTREE_PATH}}/projects/application/frontend/dockerfiles/prod.Dockerfile {{.WORKTREE_PATH}}/projects/application/frontend
      - docker push ${REGISTRY:-localhost:30500}/frontend:{{.IMAGE_TAG}}

  build:keycloak:
    desc: Build and push keycloak image
    vars:
      WORKTREE_PATH: '{{.WORKTREE_PATH | default "."}}'
      IMAGE_TAG: '{{.IMAGE_TAG | default "latest"}}'
    cmds:
      - docker build -t ${REGISTRY:-localhost:30500}/keycloak:{{.IMAGE_TAG}} -f {{.WORKTREE_PATH}}/projects/application/keycloak/dockerfiles/Dockerfile {{.WORKTREE_PATH}}/projects/application/keycloak
      - docker push ${REGISTRY:-localhost:30500}/keycloak:{{.IMAGE_TAG}}

  build:the-dev-team-backend:
    desc: Build and push the-dev-team-backend image
    vars:
      WORKTREE_PATH: '{{.WORKTREE_PATH | default "."}}'
      IMAGE_TAG: '{{.IMAGE_TAG | default "latest"}}'
    cmds:
      - docker build -t ${REGISTRY:-localhost:30500}/the-dev-team-backend:{{.IMAGE_TAG}} -f {{.WORKTREE_PATH}}/projects/the-dev-team/backend/dockerfiles/prod.Dockerfile {{.WORKTREE_PATH}}/projects/the-dev-team/backend
      - docker push ${REGISTRY:-localhost:30500}/the-dev-team-backend:{{.IMAGE_TAG}}

  build:the-dev-team-frontend:
    desc: Build and push the-dev-team-frontend image
    vars:
      WORKTREE_PATH: '{{.WORKTREE_PATH | default "."}}'
      IMAGE_TAG: '{{.IMAGE_TAG | default "latest"}}'
    cmds:
      - docker build -t ${REGISTRY:-localhost:30500}/the-dev-team-frontend:{{.IMAGE_TAG}} -f {{.WORKTREE_PATH}}/projects/the-dev-team/frontend/dockerfiles/prod.Dockerfile {{.WORKTREE_PATH}}/projects/the-dev-team/frontend
      - docker push ${REGISTRY:-localhost:30500}/the-dev-team-frontend:{{.IMAGE_TAG}}

  build:docs:
    desc: Build and push docs image
    vars:
      WORKTREE_PATH: '{{.WORKTREE_PATH | default "."}}'
      IMAGE_TAG: '{{.IMAGE_TAG | default "latest"}}'
    cmds:
      - docker build -t ${REGISTRY:-localhost:30500}/docs:{{.IMAGE_TAG}} -f {{.WORKTREE_PATH}}/projects/docs/dockerfiles/prod.Dockerfile {{.WORKTREE_PATH}}/projects/docs
      - docker push ${REGISTRY:-localhost:30500}/docs:{{.IMAGE_TAG}}

  # ===================================================================
  # Deployment — delegates to infra:k8s:*
  # ===================================================================

  deploy:diff:
    desc: Show what would change in the cluster
    cmds:
      - task: infra:k8s:diff

  deploy:apply:
    desc: Deploy all services to the cluster
    cmds:
      - task: infra:k8s:apply

  deploy:sync:
    desc: Sync all services (force apply without diff)
    cmds:
      - task: infra:k8s:sync

  deploy:destroy:
    desc: Remove all deployed services from the cluster
    cmds:
      - task: infra:k8s:destroy

  deploy:status:
    desc: Show deployed release status
    cmds:
      - task: infra:k8s:status

  deploy:logs:
    desc: Show logs for a service (usage - task deploy:logs -- backend)
    cmds:
      - task: infra:k8s:logs
