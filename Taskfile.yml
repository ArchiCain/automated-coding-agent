version: '3'

dotenv: ['.env']

includes:
  backend: ./projects/application/backend/Taskfile.yml
  frontend: ./projects/application/frontend/Taskfile.yml
  database: ./projects/application/database/Taskfile.yml
  keycloak: ./projects/application/keycloak/Taskfile.yml
  # the-dev-team is frozen reference material (see projects/the-dev-team/README.md);
  # its per-project Taskfiles are intentionally NOT included here, so task --list
  # doesn't advertise a surface we don't want anyone using.
  openclaw: ./projects/openclaw/Taskfile.yml
  dev:
    taskfile: ./infrastructure/compose/dev/Taskfile.yml
    dir: .
  env:
    taskfile: ./infrastructure/compose/sandbox/Taskfile.yml
    dir: .

tasks:
  default:
    desc: Show available tasks
    cmds:
      - task --list

  up:
    desc: Start the full compose stack (dev app + openclaw)
    cmds:
      - task: dev:up
      - task: openclaw:up

  down:
    desc: Stop the full compose stack (preserves both volumes)
    cmds:
      - task: openclaw:down
      - task: dev:down

  build:
    desc: Build images for the full compose stack
    cmds:
      - task: dev:build
      - task: openclaw:build

  run-all-tests:
    desc: Run complete test suite (unit + integration)
    cmds:
      - echo "Running complete test suite..."
      - echo ""
      - echo "Running backend unit tests..."
      - task: backend:local:test
      - echo ""
      - echo "Running frontend unit tests..."
      - task: frontend:local:test
      - echo ""
      - echo "Running backend integration tests..."
      - task: backend:local:test:integration
      - echo ""
      - echo "Running frontend integration tests..."
      - task: frontend:local:test:integration
      - echo ""
      - echo "All tests passed!"
