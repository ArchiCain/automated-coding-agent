version: '3'

dotenv: ['.env']

includes:
  backend: ./projects/application/backend/Taskfile.yml
  frontend: ./projects/application/frontend/Taskfile.yml
  database: ./projects/application/database/Taskfile.yml
  keycloak: ./projects/application/keycloak/Taskfile.yml
  e2e: ./projects/application/e2e/Taskfile.yml
  coding-agent-backend: ./projects/coding-agent/backend/Taskfile.yml
  docs: ./projects/docs/Taskfile.yml
  infra:
    taskfile: ./infrastructure/Taskfile.yml
    dir: ./infrastructure
  env:
    taskfile: infrastructure/agent-envs/Taskfile.yml
    dir: .
  history:
    taskfile: infrastructure/history/Taskfile.yml
    dir: .
  minikube:
    taskfile: infrastructure/minikube/Taskfile.yml
    dir: .
  dashboard:
    taskfile: projects/the-dev-team-dashboard/Taskfile.yml
    dir: .

tasks:
  default:
    desc: Show available tasks
    cmds:
      - task --list

  # ===================================================================
  # Local Development (Docker Compose) — delegates to infra:docker:*
  # ===================================================================

  start-local:
    desc: Start all local services (database, backend, keycloak, frontend, pgweb)
    cmds:
      - task: infra:docker:start

  start-local:build:
    desc: Start all local services with rebuild
    cmds:
      - task: infra:docker:start:build

  stop-local:
    desc: Stop all local services gracefully
    cmds:
      - task: infra:docker:stop

  purge-local:
    desc: Complete teardown of all local services (removes volumes)
    cmds:
      - task: infra:docker:purge

  purge-and-restart-local:
    desc: Complete teardown and fresh restart of all services
    cmds:
      - task: infra:docker:purge-and-restart

  logs-local:
    desc: Show logs from all services
    cmds:
      - task: infra:docker:logs

  status:
    desc: Check status of all services
    cmds:
      - task: infra:docker:status

  # ===================================================================
  # THE Dev Team — Minikube-based full stack
  # ===================================================================

  up:
    desc: "Start THE Dev Team orchestrator + dashboard (dev servers on host)"
    cmds:
      - echo "=== Installing orchestrator dependencies ==="
      - task: coding-agent-backend:local:install
      - echo ""
      - echo "=== Installing dashboard dependencies ==="
      - task: dashboard:local:install
      - echo ""
      - echo "=== Starting orchestrator ==="
      - task: coding-agent-backend:local:start
      - echo ""
      - echo "=== Starting dashboard ==="
      - task: dashboard:local:run
      - echo ""
      - |
        echo "============================================"
        echo "THE Dev Team is running."
        echo ""
        echo "  Dashboard:    http://${DEV_HOSTNAME:-localhost}:${DASHBOARD_PORT:-3002}"
        echo "  Orchestrator: http://${DEV_HOSTNAME:-localhost}:${CODING_AGENT_BACKEND_PORT:-8086}"
        echo "============================================"

  up:full:
    desc: "Start full stack with Minikube (Colima + K8s + build + deploy + orchestrator + dashboard)"
    cmds:
      - task: minikube:start
      - eval $(minikube docker-env) && task build:all
      - task: deploy:apply
      - task: up

  down:
    desc: "Stop orchestrator and dashboard dev servers"
    cmds:
      - pkill -f "nest start" 2>/dev/null || true
      - pkill -f "vite.*the-dev-team-dashboard" 2>/dev/null || true
      - |
        echo "Dev servers stopped."
        echo "  task minikube:stop    — pause the cluster (preserves state)"
        echo "  task minikube:delete  — destroy the cluster entirely"

  tailscale:hostname:
    desc: "Print your Tailscale hostname (paste into .env as DEV_HOSTNAME)"
    cmds:
      - |
        HOSTNAME=$(./scripts/detect-tailscale-hostname.sh)
        if [ -z "$HOSTNAME" ]; then
          echo "Tailscale not installed or not running."
          echo "Install: https://tailscale.com/download"
          exit 1
        fi
        echo ""
        echo "Your Tailscale hostname: $HOSTNAME"
        echo ""
        echo "To use it, set in .env:"
        echo "  DEV_HOSTNAME=$HOSTNAME"
        echo ""
        echo "Then restart your dev environment:"
        echo "  task stop-local && task start-local"

  # ===================================================================
  # Testing
  # ===================================================================

  run-all-tests:
    desc: Run complete test suite (unit + integration + e2e)
    cmds:
      - echo "Running complete test suite..."
      - echo ""
      - echo "Running backend unit tests..."
      - task: backend:local:test
      - echo ""
      - echo "Running frontend unit tests..."
      - task: frontend:local:test
      - echo ""
      - echo "Running backend integration tests..."
      - task: backend:local:test:integration
      - echo ""
      - echo "Running frontend integration tests..."
      - task: frontend:local:test:integration
      - echo ""
      - echo "Running e2e tests..."
      - task: e2e:test
      - echo ""
      - echo "All tests passed!"

  # ===================================================================
  # Infrastructure — delegates to infra:terraform:*
  # ===================================================================

  infra:init:
    desc: Initialize Terraform for K3s infrastructure
    cmds:
      - task: infra:terraform:init

  infra:plan:
    desc: Plan K3s infrastructure changes
    cmds:
      - task: infra:terraform:plan

  infra:apply:
    desc: Apply K3s infrastructure (creates EC2 + K3s)
    cmds:
      - task: infra:terraform:apply

  infra:destroy:
    desc: Destroy K3s infrastructure
    cmds:
      - task: infra:terraform:destroy

  infra:output:
    desc: Show K3s infrastructure outputs (IP, URLs)
    cmds:
      - task: infra:terraform:output

  # ===================================================================
  # Build & Push (Container Images)
  # ===================================================================
  # Images are pushed to an in-cluster registry running on the K3s node.
  # This is used instead of ECR/GHCR because for a single-node K3s setup
  # there is no practical benefit to a managed registry — the only image
  # consumer is on the same node. To switch to ECR/GHCR later, just
  # change the REGISTRY env var.

  build:all:
    desc: Build and push all service images
    vars:
      WORKTREE_PATH: '{{.WORKTREE_PATH | default "."}}'
      IMAGE_TAG: '{{.IMAGE_TAG | default "latest"}}'
    cmds:
      - task: build:backend
        vars:
          WORKTREE_PATH: '{{.WORKTREE_PATH}}'
          IMAGE_TAG: '{{.IMAGE_TAG}}'
      - task: build:frontend
        vars:
          WORKTREE_PATH: '{{.WORKTREE_PATH}}'
          IMAGE_TAG: '{{.IMAGE_TAG}}'
      - task: build:keycloak
        vars:
          WORKTREE_PATH: '{{.WORKTREE_PATH}}'
          IMAGE_TAG: '{{.IMAGE_TAG}}'
      - task: build:coding-agent-backend
        vars:
          WORKTREE_PATH: '{{.WORKTREE_PATH}}'
          IMAGE_TAG: '{{.IMAGE_TAG}}'
      - task: build:docs
        vars:
          WORKTREE_PATH: '{{.WORKTREE_PATH}}'
          IMAGE_TAG: '{{.IMAGE_TAG}}'
      - task: build:dashboard
        vars:
          WORKTREE_PATH: '{{.WORKTREE_PATH}}'
          IMAGE_TAG: '{{.IMAGE_TAG}}'

  build:backend:
    desc: Build and push backend image
    vars:
      WORKTREE_PATH: '{{.WORKTREE_PATH | default "."}}'
      IMAGE_TAG: '{{.IMAGE_TAG | default "latest"}}'
    cmds:
      - docker build -t ${REGISTRY:-localhost:30500}/backend:{{.IMAGE_TAG}} -f {{.WORKTREE_PATH}}/projects/application/backend/dockerfiles/prod.Dockerfile {{.WORKTREE_PATH}}/projects/application/backend
      - docker push ${REGISTRY:-localhost:30500}/backend:{{.IMAGE_TAG}}

  build:frontend:
    desc: Build and push frontend image
    vars:
      WORKTREE_PATH: '{{.WORKTREE_PATH | default "."}}'
      IMAGE_TAG: '{{.IMAGE_TAG | default "latest"}}'
    cmds:
      - docker build -t ${REGISTRY:-localhost:30500}/frontend:{{.IMAGE_TAG}} --build-arg VITE_BACKEND_URL=${VITE_BACKEND_URL:-http://api.localhost} -f {{.WORKTREE_PATH}}/projects/application/frontend/dockerfiles/prod.Dockerfile {{.WORKTREE_PATH}}/projects/application/frontend
      - docker push ${REGISTRY:-localhost:30500}/frontend:{{.IMAGE_TAG}}

  build:keycloak:
    desc: Build and push keycloak image
    vars:
      WORKTREE_PATH: '{{.WORKTREE_PATH | default "."}}'
      IMAGE_TAG: '{{.IMAGE_TAG | default "latest"}}'
    cmds:
      - docker build -t ${REGISTRY:-localhost:30500}/keycloak:{{.IMAGE_TAG}} -f {{.WORKTREE_PATH}}/projects/application/keycloak/dockerfiles/Dockerfile {{.WORKTREE_PATH}}/projects/application/keycloak
      - docker push ${REGISTRY:-localhost:30500}/keycloak:{{.IMAGE_TAG}}

  build:coding-agent-backend:
    desc: Build and push coding-agent-backend image
    vars:
      WORKTREE_PATH: '{{.WORKTREE_PATH | default "."}}'
      IMAGE_TAG: '{{.IMAGE_TAG | default "latest"}}'
    cmds:
      - docker build -t ${REGISTRY:-localhost:30500}/coding-agent-backend:{{.IMAGE_TAG}} -f {{.WORKTREE_PATH}}/projects/coding-agent/backend/dockerfiles/prod.Dockerfile {{.WORKTREE_PATH}}/projects/coding-agent/backend
      - docker push ${REGISTRY:-localhost:30500}/coding-agent-backend:{{.IMAGE_TAG}}

  build:dashboard:
    desc: Build and push THE Dev Team dashboard image
    vars:
      WORKTREE_PATH: '{{.WORKTREE_PATH | default "."}}'
      IMAGE_TAG: '{{.IMAGE_TAG | default "latest"}}'
    cmds:
      - docker build -t ${REGISTRY:-localhost:30500}/the-dev-team-dashboard:{{.IMAGE_TAG}} --build-arg VITE_BACKEND_URL=${VITE_BACKEND_URL:-http://api.localhost} -f {{.WORKTREE_PATH}}/projects/the-dev-team-dashboard/dockerfiles/prod.Dockerfile {{.WORKTREE_PATH}}/projects/the-dev-team-dashboard
      - docker push ${REGISTRY:-localhost:30500}/the-dev-team-dashboard:{{.IMAGE_TAG}}

  build:docs:
    desc: Build and push docs image
    vars:
      WORKTREE_PATH: '{{.WORKTREE_PATH | default "."}}'
      IMAGE_TAG: '{{.IMAGE_TAG | default "latest"}}'
    cmds:
      - docker build -t ${REGISTRY:-localhost:30500}/docs:{{.IMAGE_TAG}} -f {{.WORKTREE_PATH}}/projects/docs/dockerfiles/prod.Dockerfile {{.WORKTREE_PATH}}/projects/docs
      - docker push ${REGISTRY:-localhost:30500}/docs:{{.IMAGE_TAG}}

  # ===================================================================
  # Deployment — delegates to infra:k8s:*
  # ===================================================================

  deploy:diff:
    desc: Show what would change in the cluster
    cmds:
      - task: infra:k8s:diff

  deploy:apply:
    desc: Deploy all services to the cluster
    cmds:
      - task: infra:k8s:apply

  deploy:sync:
    desc: Sync all services (force apply without diff)
    cmds:
      - task: infra:k8s:sync

  deploy:destroy:
    desc: Remove all deployed services from the cluster
    cmds:
      - task: infra:k8s:destroy

  deploy:status:
    desc: Show deployed release status
    cmds:
      - task: infra:k8s:status

  deploy:logs:
    desc: Show logs for a service (usage - task deploy:logs -- backend)
    cmds:
      - task: infra:k8s:logs
