replicaCount: 1

image:
  repository: the-dev-team-dashboard
  tag: latest
  pullPolicy: IfNotPresent

service:
  port: 8080

ingress:
  enabled: true
  host: ""
  tls: false

env: {}

resources:
  requests:
    memory: "128Mi"
    cpu: "50m"
  limits:
    memory: "256Mi"
    cpu: "200m"

healthCheck:
  path: /health
  initialDelaySeconds: 10
  periodSeconds: 10
