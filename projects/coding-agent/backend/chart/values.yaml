replicaCount: 1

image:
  repository: coding-agent-backend
  tag: latest
  pullPolicy: Always

service:
  port: 8080

ingress:
  enabled: true
  host: ""
  tls: false

env: {}
secretEnv: {}

resources:
  requests:
    memory: "512Mi"
    cpu: "200m"
  limits:
    memory: "2Gi"
    cpu: "2000m"

healthCheck:
  path: /health
  initialDelaySeconds: 60
  periodSeconds: 10

# ServiceAccount for kubectl access within the cluster
serviceAccount:
  create: true
  name: ""

# RBAC rules for the coding agent
rbac:
  create: true

# Persistent workspace for cloned repos
workspace:
  enabled: true
  size: "50Gi"
  storageClass: ""
  mountPath: /workspace
