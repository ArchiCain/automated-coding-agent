<header class="app-header">
  <div class="header-left">
    <button mat-icon-button (click)="onMenuClick()" aria-label="Open navigation menu">
      <mat-icon>menu</mat-icon>
    </button>

    <button
      mat-icon-button
      (click)="onAgentsClick()"
      class="agents-button"
      [class.has-running]="runningCount > 0"
      aria-label="Open agents panel"
    >
      <mat-icon [matBadge]="runningCount > 0 ? runningCount : null" matBadgeColor="primary">
        smart_toy
      </mat-icon>
    </button>
  </div>

  <div class="header-center">
    <span class="app-title">Coding Agent</span>
  </div>

  <div class="header-right">
    <!-- Placeholder for future actions -->
  </div>
</header>
