@if (loading()) {
  <div class="loading-container">
    <mat-spinner diameter="40"></mat-spinner>
    <span>Loading session...</span>
  </div>
} @else if (error() && !session()) {
  <div class="error-container">
    <mat-icon>error</mat-icon>
    <span>{{ error() }}</span>
    <button mat-stroked-button (click)="goBack()">Back to Backlog</button>
  </div>
} @else if (agent()) {
  <!-- Slide-over for viewing documents -->
  <app-slide-over
    [isOpen]="!!viewingDocument()"
    [title]="viewingDocument()?.name || getFileName(viewingDocument()?.path || '')"
    [content]="documentContent()"
    [loading]="documentLoading()"
    (closed)="closeDocumentView()"
  ></app-slide-over>

  <div class="session-page">
    <!-- Header -->
    <header class="session-header">
      <div class="header-left">
        <button mat-icon-button class="back-btn" (click)="goBack()">
          <mat-icon>arrow_back</mat-icon>
        </button>
        <mat-icon class="session-icon">play_circle</mat-icon>
        <h1 class="session-title">{{ sessionName }}</h1>
        <span class="session-badge">EXECUTION</span>
      </div>
      @if (canStart()) {
        <button
          mat-flat-button
          color="primary"
          class="start-btn"
          (click)="startExecution()"
        >
          <mat-icon>play_arrow</mat-icon>
          Start Execution
        </button>
      }
    </header>

    <!-- Split view -->
    <div class="split-view">
      <!-- Left: Task content viewer -->
      <div class="task-panel">
        <div class="panel-header">
          <div class="panel-title">
            <mat-icon>description</mat-icon>
            <span>Task</span>
          </div>
          @if (taskLoading()) {
            <mat-spinner diameter="16" class="panel-loading"></mat-spinner>
          }
        </div>

        <div class="panel-content">
          @if (taskLoading() && !taskContent()) {
            <div class="content-loading-state">
              <mat-spinner diameter="32"></mat-spinner>
            </div>
          } @else {
            <markdown [data]="taskContent()"></markdown>
          }
        </div>
      </div>

      <!-- Right: Agent card in interactive mode -->
      <div class="agent-panel">
        <app-agent-card
          #agentCard
          [agent]="agent()!"
          [initialMode]="'interactive'"
          [hideBackButton]="true"
          [startConfigCollapsed]="true"
          (agentChange)="onAgentChange($event)"
          (viewDocument)="onViewDocument($event)"
          (sessionStarted)="onSessionStarted($event)"
          (close)="goBack()"
        ></app-agent-card>
      </div>
    </div>
  </div>
}
