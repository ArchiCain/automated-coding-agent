<div class="page-container">
  <div class="header">
    <button mat-icon-button (click)="goBack()" class="back-button">
      <mat-icon>arrow_back</mat-icon>
    </button>
    <h1>{{ getPageTitle() }}</h1>
  </div>

  @if (loading()) {
    <div class="loading">
      <mat-spinner diameter="40"></mat-spinner>
    </div>
  }

  @if (error()) {
    <div class="error-box">
      <mat-icon>error_outline</mat-icon>
      <p>{{ error() }}</p>
      <button mat-button (click)="loadDocs(currentPath())">Retry</button>
    </div>
  }

  @if (!loading() && !error()) {
    <div class="boxes-row">
      @for (doc of docs(); track doc.path) {
        <div class="box clickable" (click)="openDoc(doc)">
          <div class="box-icon">
            <mat-icon>{{ getDocIcon(doc) }}</mat-icon>
          </div>
          <h2 class="box-title">{{ getDisplayName(doc.name) }}</h2>
          <div class="box-meta">
            <span class="meta-text">{{ doc.type }}</span>
          </div>
        </div>
      } @empty {
        <div class="empty-box">
          <mat-icon>folder_off</mat-icon>
          <p>No documents found</p>
        </div>
      }
    </div>
  }
</div>

<app-slide-over
  [isOpen]="slideOverOpen()"
  [title]="slideOverTitle()"
  [content]="slideOverContent()"
  [loading]="slideOverLoading()"
  (closed)="closeSlideOver()">
</app-slide-over>
