<div class="agent-card" [style.border-left-color]="accentColor">
  <div class="card-header">
    <mat-icon class="agent-icon" [style.color]="accentColor">{{ iconName }}</mat-icon>
    <div class="card-info">
      <span class="agent-name">{{ agent.name }}</span>
      <span class="agent-provider">{{ providerLabel }}</span>
    </div>
  </div>

  @if (agent.description) {
    <p class="agent-description">{{ agent.description }}</p>
  }

  <div class="card-meta">
    <span class="meta-item">
      <mat-icon class="meta-icon">description</mat-icon>
      instructions.md
    </span>
    @if (agent.knowledgeFiles.length > 0) {
      <span class="meta-item">
        <mat-icon class="meta-icon">attach_file</mat-icon>
        {{ agent.knowledgeFiles.length }} knowledge file{{ agent.knowledgeFiles.length > 1 ? 's' : '' }}
      </span>
    }
  </div>

  <div class="card-actions">
    <button mat-icon-button (click)="edit.emit(); $event.stopPropagation()" matTooltip="Edit">
      <mat-icon>edit</mat-icon>
    </button>
    <button mat-icon-button (click)="test.emit(); $event.stopPropagation()" matTooltip="Test Agent">
      <mat-icon>play_arrow</mat-icon>
    </button>
    <button mat-icon-button class="delete-btn" (click)="delete.emit(); $event.stopPropagation()" matTooltip="Delete">
      <mat-icon>delete_outline</mat-icon>
    </button>
  </div>
</div>
