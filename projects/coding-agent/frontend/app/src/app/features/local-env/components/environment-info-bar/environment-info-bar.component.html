<div class="env-info-bar">
  <div class="info-item">
    <mat-icon>account_tree</mat-icon>
    <span class="info-label">Branch</span>
    <code>{{ branch() }}</code>
  </div>

  @if (worktreePath()) {
    <div class="info-item">
      <mat-icon>folder</mat-icon>
      <span class="info-label">Worktree</span>
      <code>{{ worktreePath() }}</code>
    </div>
  }

  @if (showGitStatus() && gitStatus()) {
    <div class="git-badges">
      @if (isDirty()) {
        <span class="badge dirty">
          <mat-icon>edit</mat-icon>
          dirty
        </span>
      }
      @if (stagedCount() > 0) {
        <span class="badge staged">{{ stagedCount() }}</span>
      }
    </div>
  }
</div>
