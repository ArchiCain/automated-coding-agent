<div class="projects-page">
  <!-- Page Header -->
  <div class="page-header">
    <div class="header-top">
      <h1>Projects</h1>
      <app-branch-controls />
    </div>

    <div class="header-controls">
      <app-docker-controls-bar
        [envId]="envId"
        (onOperationComplete)="onDockerOperationComplete()"
      />
      <app-task-bar />
    </div>
  </div>

  <!-- Loading -->
  @if (loading()) {
    <div class="loading-state">
      <mat-spinner diameter="32"></mat-spinner>
      <span>Loading projects...</span>
    </div>
  }

  <!-- Project Rows -->
  @if (!loading()) {
    <div class="project-list">
      @for (project of sortedProjects(); track project.id) {
        <div class="project-row" [routerLink]="['/projects', project.id]">
          <span class="status-dot" [ngClass]="getStatusDotClass(project)"></span>
          <span class="project-name">{{ project.name }}</span>
          <span class="tech-badge">{{ project.techBadge }}</span>
          @if (project.port) {
            <span class="port-badge">:{{ project.port }}</span>
          }
          @if (project.hasReadme) {
            <span class="readme-link" (click)="openReadme(project, $event)">README</span>
          }

          @if (project.hasDocker) {
            <app-docker-controls-bar
              class="inline-docker"
              [envId]="project.id"
              [compact]="true"
              [inline]="true"
              (click)="$event.stopPropagation()"
              (onOperationComplete)="onDockerOperationComplete()"
            />
          }
        </div>
      }
    </div>
  }

  <app-slide-over
    [title]="readmeTitle()"
    [content]="readmeContent()"
    [isOpen]="readmeOpen()"
    (closed)="closeReadme()"
  />
</div>
