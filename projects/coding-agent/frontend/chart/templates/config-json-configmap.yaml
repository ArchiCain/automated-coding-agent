{{- if .Values.runtimeConfig.enabled }}
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ .Release.Name }}-runtime-config
  labels:
    app: {{ .Release.Name }}
data:
  config.json: |
    {
      "apiUrl": {{ .Values.runtimeConfig.apiUrl | quote }},
      "wsUrl": {{ .Values.runtimeConfig.wsUrl | quote }},
      "environment": {{ .Values.runtimeConfig.environment | quote }}
    }
{{- end }}
