replicaCount: 1

image:
  repository: coding-agent-frontend
  tag: latest
  pullPolicy: Always

service:
  port: 8080

ingress:
  enabled: true
  host: ""
  tls: false

env: {}

# API proxy through nginx (same-origin cookies, no cross-domain issues)
apiProxy:
  enabled: false
  backendService: "coding-agent-backend"
  backendPort: 8080

# Runtime config.json override for Angular
runtimeConfig:
  enabled: false
  apiUrl: "/api"
  wsUrl: ""
  environment: "production"

resources:
  requests:
    memory: "128Mi"
    cpu: "50m"
  limits:
    memory: "256Mi"
    cpu: "200m"

healthCheck:
  path: /health
  initialDelaySeconds: 10
  periodSeconds: 10
