version: '3'

tasks:
  # Local Development Tasks (HOST execution - no Docker)
  local:install:
    desc: Install dependencies
    dir: '{{.TASKFILE_DIR}}/app'
    cmds:
      - echo "Installing dependencies..."
      - npm install
      - echo "Dependencies installed"

  local:start:
    desc: Start Angular development server locally (on host)
    deps: [local:install]
    dir: '{{.TASKFILE_DIR}}/app'
    cmds:
      - echo "Starting Angular dev server at http://localhost:4200..."
      - npm run start

  local:build:
    desc: Build the application
    deps: [local:install]
    dir: '{{.TASKFILE_DIR}}/app'
    cmds:
      - npm run build

  # Testing Tasks
  local:test:
    desc: Run unit tests
    deps: [local:install]
    dir: '{{.TASKFILE_DIR}}/app'
    cmds:
      - npm run test

  local:test:watch:
    desc: Run tests in watch mode
    deps: [local:install]
    dir: '{{.TASKFILE_DIR}}/app'
    cmds:
      - npm run test -- --watch

  # Code Quality Tasks
  local:lint:
    desc: Lint the code
    dir: '{{.TASKFILE_DIR}}/app'
    cmds:
      - npm run lint

  local:clean:
    desc: Clean build artifacts and node_modules
    dir: '{{.TASKFILE_DIR}}/app'
    cmds:
      - rm -rf dist .angular node_modules
