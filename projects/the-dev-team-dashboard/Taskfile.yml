version: '3'

tasks:
  # Local Development Tasks
  local:install:
    desc: Install dependencies
    dir: '{{.TASKFILE_DIR}}/app'
    cmds:
      - echo "Installing dependencies..."
      - npm install
      - echo "Dependencies installed"

  local:run:
    desc: Run the dashboard locally outside of Docker (vite dev server)
    deps: [local:install]
    dir: '{{.TASKFILE_DIR}}/app'
    cmds:
      - npm run dev

  local:start:
    desc: Start the dashboard locally in Docker
    deps: [local:install]
    dir: '{{.TASKFILE_DIR}}/../..'
    cmds:
      - docker compose -f infrastructure/docker/compose.yml up --build -d dashboard
      - echo "Dashboard started at http://localhost:${DASHBOARD_PORT:-3002}"

  local:stop:
    desc: Stop the dashboard locally
    dir: '{{.TASKFILE_DIR}}/../..'
    cmds:
      - docker compose -f infrastructure/docker/compose.yml stop dashboard

  local:restart:
    desc: Restart the dashboard locally (rebuild and start)
    deps: [local:install]
    dir: '{{.TASKFILE_DIR}}/../..'
    cmds:
      - docker compose -f infrastructure/docker/compose.yml stop dashboard
      - docker compose -f infrastructure/docker/compose.yml up --build -d dashboard
      - echo "Dashboard restarted at http://localhost:${DASHBOARD_PORT:-3002}"

  local:logs:
    desc: Show dashboard logs
    dir: '{{.TASKFILE_DIR}}/../..'
    cmds:
      - docker compose -f infrastructure/docker/compose.yml logs -f dashboard

  local:health:
    desc: Test dashboard health endpoint
    cmds:
      - curl -f http://localhost:${DASHBOARD_PORT:-3002}/health || echo "Health check failed"

  local:build:
    desc: Build the dashboard for production (vite build)
    dir: '{{.TASKFILE_DIR}}/app'
    cmds:
      - npm run build

  local:shell:
    desc: Get a shell inside the running dashboard container
    dir: '{{.TASKFILE_DIR}}/../..'
    cmds:
      - docker compose -f infrastructure/docker/compose.yml exec dashboard sh

  # Testing / Quality Tasks
  local:lint:
    desc: Lint the dashboard code
    dir: '{{.TASKFILE_DIR}}/app'
    cmds:
      - npm run lint

  local:type-check:
    desc: Run TypeScript type checking
    dir: '{{.TASKFILE_DIR}}/app'
    cmds:
      - npm run type-check

  local:test:
    desc: Run unit tests
    deps: [local:install]
    dir: '{{.TASKFILE_DIR}}/app'
    cmds:
      - npm run test

  local:clean:
    desc: Clean build artifacts and node_modules
    dir: '{{.TASKFILE_DIR}}/app'
    cmds:
      - rm -rf dist node_modules
