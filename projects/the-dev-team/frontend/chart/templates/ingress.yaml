{{- if .Values.ingress.enabled }}
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: {{ include "the-dev-team-frontend.fullname" . }}
  labels:
    {{- include "the-dev-team-frontend.labels" . | nindent 4 }}
  annotations:
    traefik.ingress.kubernetes.io/router.entrypoints: web{{- if .Values.ingress.tls }},websecure{{- end }}
    {{- if .Values.ingress.tls }}
    traefik.ingress.kubernetes.io/router.tls: "true"
    {{- end }}
spec:
  ingressClassName: traefik
  {{- if .Values.ingress.tls }}
  tls:
    - hosts:
        - {{ .Values.ingress.host }}
      secretName: {{ include "the-dev-team-frontend.fullname" . }}-tls
  {{- end }}
  rules:
    - host: {{ .Values.ingress.host }}
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: {{ include "the-dev-team-frontend.fullname" . }}
                port:
                  number: {{ .Values.service.port }}
{{- end }}
