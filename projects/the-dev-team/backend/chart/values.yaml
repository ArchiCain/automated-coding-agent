replicaCount: 1

image:
  repository: the-dev-team-backend
  tag: latest
  pullPolicy: IfNotPresent

service:
  port: 8080

ingress:
  enabled: true
  host: ""
  tls: false

env: {}
secretEnv: {}

resources:
  requests:
    memory: "512Mi"
    cpu: "200m"
  limits:
    memory: "2Gi"
    cpu: "2000m"

healthCheck:
  path: /health
  initialDelaySeconds: 60
  periodSeconds: 10

# ServiceAccount for kubectl access within the cluster
serviceAccount:
  create: true
  name: ""

# RBAC rules for the agent
rbac:
  create: true

# GitHub App authentication
githubApp:
  privateKeySecret: ""  # Name of K8s secret containing the private key
  privateKeyFile: "private-key.pem"

# Docker socket mount for image building
docker:
  socketMount: true  # Mount /var/run/docker.sock for image building

# Persistent workspace for cloned repos
workspace:
  enabled: true
  size: "50Gi"
  storageClass: ""
  mountPath: /workspace
  repoOwner: "ArchiCain"
  repoName: "automated-coding-agent"
