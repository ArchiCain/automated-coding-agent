site_name: Automated Repo
site_description: Project documentation
site_url: ""

theme:
  name: material
  palette:
    scheme: slate
    primary: deep purple
    accent: amber
  features:
    - navigation.sections
    - navigation.expand
    - search.highlight
    - content.code.copy

nav:
  - Home: index.md

  - Getting Started:
    - Prerequisites & Nix: getting-started/prerequisites.md
    - Environment Setup: getting-started/environment-setup.md

  - Projects:
    - Overview: projects/overview.md
    - Application:
      - Backend: projects/application/backend.md
      - Frontend: projects/application/frontend.md
      - Database: projects/application/database.md
      - Keycloak: projects/application/keycloak.md
      - E2E Tests: projects/application/e2e.md
    - THE Dev Team:
      - Orchestrator: projects/coding-agent/backend.md
      - Dashboard: projects/the-dev-team-dashboard.md
      - Task State & History: projects/coding-agent/backlog.md

  - THE Dev Team:
    - Overview: the-dev-team/overview.md
    - Roles & Skills: the-dev-team/roles-and-skills.md
    - Execution Loop: the-dev-team/execution-loop.md
    - Validation Gates: the-dev-team/validation-gates.md
    - Sandbox Environments: the-dev-team/sandbox-environments.md
    - Safety Model: the-dev-team/safety-model.md
    - PR Workflow: the-dev-team/pr-workflow.md
    - Submitting Tasks: the-dev-team/submitting-tasks.md
    - Configuration: the-dev-team/configuration.md

  - Development:
    - Taskfile Conventions: development/taskfile.md
    - Local Workflow: development/local-workflow.md
    - Testing: development/testing.md

  - Infrastructure:
    - Overview: infrastructure/overview.md
    - Terraform: infrastructure/terraform.md
    - Kubernetes: infrastructure/kubernetes.md
    - Networking: infrastructure/networking.md
    - Docker Compose: infrastructure/docker-compose.md
    - CI/CD: infrastructure/cicd.md

markdown_extensions:
  - admonition
  - pymdownx.highlight
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true
  - toc:
      permalink: true
