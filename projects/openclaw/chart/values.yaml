replicaCount: 1

image:
  repository: openclaw-gateway
  tag: latest
  # IfNotPresent lets Minikube use images cached in its Docker daemon when the
  # in-cluster registry push flakes. On a single-node cluster Always just causes
  # avoidable ImagePullBackOffs. Use a fresh IMAGE_TAG to force a re-pull.
  pullPolicy: IfNotPresent

service:
  port: 18789

ingress:
  enabled: true
  host: ""
  # tls: true puts the ingress on Traefik's websecure entrypoint. With no
  # tlsSecretName, Traefik falls back to its default TLSStore — install the
  # cert via `task certs:install` once per cluster.
  tls: false
  tlsSecretName: ""

env: {}
secretEnv: {}

resources:
  requests:
    memory: "512Mi"
    cpu: "200m"
  limits:
    memory: "4Gi"
    cpu: "2000m"

healthCheck:
  path: /health
  initialDelaySeconds: 60
  periodSeconds: 10

serviceAccount:
  create: true
  name: ""

rbac:
  create: true

appNamespace: "app"

workspace:
  enabled: true
  size: "20Gi"
  storageClass: ""
  mountPath: /workspace
