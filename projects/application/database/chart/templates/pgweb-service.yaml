{{- if .Values.pgweb.enabled }}
apiVersion: v1
kind: Service
metadata:
  name: {{ .Release.Name }}-pgweb
  labels:
    app: {{ .Release.Name }}-pgweb
spec:
  type: ClusterIP
  ports:
    - port: 8081
      targetPort: 8081
      protocol: TCP
  selector:
    app: {{ .Release.Name }}-pgweb
{{- end }}
