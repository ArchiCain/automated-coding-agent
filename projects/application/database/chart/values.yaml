image:
  repository: pgvector/pgvector
  tag: pg16
  pullPolicy: IfNotPresent

service:
  port: 5432

env: {}

persistence:
  enabled: true
  size: 10Gi
  storageClass: ""

resources:
  requests:
    memory: "256Mi"
    cpu: "100m"
  limits:
    memory: "512Mi"
    cpu: "500m"

healthCheck:
  initialDelaySeconds: 10
  periodSeconds: 5

pgweb:
  enabled: false
  image:
    repository: sosedoff/pgweb
    tag: latest
    pullPolicy: IfNotPresent
  ingress:
    enabled: true
    host: ""
    tls: false
  resources:
    requests:
      memory: "64Mi"
      cpu: "25m"
    limits:
      memory: "128Mi"
      cpu: "100m"
