version: "3"

# Service is named `postgres` in infrastructure/compose/dev/compose.yml
# (compose/dev uses the pgvector/pgvector:pg16 image directly — no
# local build step). Credentials come from the dev .env (POSTGRES_USER,
# POSTGRES_PASSWORD, POSTGRES_DB). pgweb is no longer part of the
# compose stack; if you need a DB UI, run one via `docker run` ad-hoc.

tasks:
  local:start:
    desc: "Start PostgreSQL only"
    dir: "{{.TASKFILE_DIR}}/../../.."
    cmds:
      - docker compose -f infrastructure/compose/dev/compose.yml --env-file infrastructure/compose/dev/.env up -d postgres

  local:stop:
    desc: "Stop PostgreSQL"
    dir: "{{.TASKFILE_DIR}}/../../.."
    cmds:
      - docker compose -f infrastructure/compose/dev/compose.yml stop postgres

  local:restart:
    desc: "Restart PostgreSQL"
    dir: "{{.TASKFILE_DIR}}/../../.."
    cmds:
      - docker compose -f infrastructure/compose/dev/compose.yml restart postgres

  local:logs:
    desc: "View PostgreSQL logs"
    dir: "{{.TASKFILE_DIR}}/../../.."
    cmds:
      - docker compose -f infrastructure/compose/dev/compose.yml logs -f postgres

  local:reset:
    desc: "Stop PostgreSQL and wipe the named volume (WARNING: deletes all data)"
    dir: "{{.TASKFILE_DIR}}/../../.."
    cmds:
      - echo "WARNING — this deletes the dev_postgres-data volume"
      - docker compose -f infrastructure/compose/dev/compose.yml stop postgres
      - docker compose -f infrastructure/compose/dev/compose.yml rm -f postgres
      - docker volume rm dev_postgres-data || true
      - echo "Run 'task database:local:start' to recreate the volume."

  local:shell:
    desc: "Open psql shell"
    dir: "{{.TASKFILE_DIR}}/../../.."
    deps: [local:start]
    cmds:
      - docker compose -f infrastructure/compose/dev/compose.yml exec postgres psql -U postgres

  local:backup:
    desc: "Dump the app database to projects/application/database/backups/"
    dir: "{{.TASKFILE_DIR}}/../../.."
    deps: [local:start]
    vars:
      TIMESTAMP:
        sh: date +%Y%m%d_%H%M%S
    cmds:
      - mkdir -p projects/application/database/backups
      - docker compose -f infrastructure/compose/dev/compose.yml exec -T postgres pg_dump -U postgres app > projects/application/database/backups/backup_{{.TIMESTAMP}}.sql

  local:health:
    desc: "Check postgres health"
    dir: "{{.TASKFILE_DIR}}/../../.."
    cmds:
      - docker compose -f infrastructure/compose/dev/compose.yml exec -T postgres pg_isready -U postgres
