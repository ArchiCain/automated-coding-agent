<form [formGroup]="form" (ngSubmit)="onSubmit()" class="user-form">
  <mat-form-field appearance="outline">
    <mat-label>Email</mat-label>
    <input matInput formControlName="email" type="email" />
    @if (!isEditMode) {
      <mat-hint>Email doubles as the username and cannot be changed later.</mat-hint>
    }
  </mat-form-field>

  @if (!isEditMode) {
    <mat-form-field appearance="outline">
      <mat-label>Temporary password</mat-label>
      <input matInput formControlName="temporaryPassword" type="password" />
      <mat-hint>User can change this at any time after first sign-in.</mat-hint>
    </mat-form-field>
  }

  <mat-form-field appearance="outline">
    <mat-label>First name</mat-label>
    <input matInput formControlName="firstName" />
  </mat-form-field>

  <mat-form-field appearance="outline">
    <mat-label>Last name</mat-label>
    <input matInput formControlName="lastName" />
  </mat-form-field>

  <mat-form-field appearance="outline">
    <mat-label>Role</mat-label>
    <mat-select formControlName="role">
      @for (role of availableRoles; track role) {
        <mat-option [value]="role">{{ role }}</mat-option>
      }
    </mat-select>
  </mat-form-field>

  <div class="form-actions">
    <button mat-button type="button" (click)="cancelForm.emit()">Cancel</button>
    <button mat-flat-button type="submit" [disabled]="form.invalid">
      {{ isEditMode ? 'Update' : 'Create' }}
    </button>
  </div>
</form>
